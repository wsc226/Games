<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Game Launcher</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    width:100%;height:100%;overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
    background:#1a1b2e;
    -webkit-user-select:none;user-select:none;
    -webkit-tap-highlight-color:transparent;
  }
  .wrap{
    width:100%;height:100%;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    padding:2.5vh 4vw;
    gap:2vh;
  }
  h1{
    font-size:3.6vh;font-weight:700;
    color:rgba(255,255,255,.88);
    letter-spacing:.06em;
    text-transform:uppercase;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    grid-template-rows:repeat(2,1fr);
    gap:1.6vh 1.4vw;
    width:100%;
    max-width:960px;
    flex:1;
    max-height:74vh;
  }
  .btn{
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:1vh;
    border-radius:1.6vh;
    border:1px solid rgba(255,255,255,.08);
    cursor:pointer;
    text-decoration:none;
    transition:transform .12s,box-shadow .12s;
    box-shadow:0 4px 20px rgba(0,0,0,.3);
    position:relative;
    overflow:hidden;
  }
  .btn:active{
    transform:scale(.94);
    box-shadow:0 2px 8px rgba(0,0,0,.3);
  }
  .btn svg{
    width:15vh;height:15vh;
    stroke:rgba(255,255,255,.92);
    stroke-width:1.6;
    stroke-linecap:round;
    stroke-linejoin:round;
    fill:none;
    filter:drop-shadow(0 1px 3px rgba(0,0,0,.2));
  }
  .btn .label{
    font-size:1.7vh;font-weight:600;
    color:rgba(255,255,255,.85);
    text-align:center;line-height:1.25;
    letter-spacing:.02em;
  }
  .btn .flag{
    position:absolute;top:.7vh;right:.7vh;
    font-size:2.4vh;
    filter:drop-shadow(0 1px 2px rgba(0,0,0,.3));
  }

  .c1{background:linear-gradient(145deg,#c0392b,#962d22);}
  .c2{background:linear-gradient(145deg,#d4a853,#b8912e);}
  .c3{background:linear-gradient(145deg,#2980b9,#1f6691);}
  .c4{background:linear-gradient(145deg,#8e44ad,#6c3382);}
  .c5{background:linear-gradient(145deg,#16a085,#0e7c65);}
  .c6{background:linear-gradient(145deg,#2c3e6e,#1e2a4a);}
  .c7{background:linear-gradient(145deg,#e67e22,#c0691c);}
  .c8{background:linear-gradient(145deg,#c0392b,#8e2c20);}
  .c9{background:linear-gradient(145deg,#3498db,#2176ad);}
  .c10{background:linear-gradient(145deg,#00b4d8,#0077b6);}

  @media screen and (orientation:portrait){
    .grid{
      grid-template-columns:repeat(3,1fr);
      grid-template-rows:repeat(4,1fr);
      max-width:600px;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Pick a Game</h1>
  <div class="grid">

    <a class="btn c1" href="airplane.html">
      <svg viewBox="0 0 24 24"><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.4-.1.9.3 1.1L11 12l-2 3H6l-2 2 3 1 1 3 2-2v-3l3-2 3.7 7.3c.2.4.7.5 1.1.3l.5-.3c.4-.2.6-.6.5-1.1z"/></svg>
      <span class="label">Little Captain<br>747</span>
    </a>

    <a class="btn c2" href="elevatorHK.html">
      <span class="flag">🇭🇰</span>
      <svg viewBox="0 0 24 24"><rect x="3" y="2" width="18" height="20" rx="2"/><line x1="12" y1="2" x2="12" y2="22"/><path d="M8 12V8l2 2 2-2v4"/><path d="M14 12V8l2 2 2-2v4"/></svg>
      <span class="label">Elevator</span>
    </a>

    <a class="btn c3" href="elevatorJP.html">
      <span class="flag">🇯🇵</span>
      <svg viewBox="0 0 24 24"><rect x="3" y="2" width="18" height="20" rx="2"/><line x1="12" y1="2" x2="12" y2="22"/><path d="M8 12V8l2 2 2-2v4"/><path d="M14 12V8l2 2 2-2v4"/></svg>
      <span class="label">Elevator</span>
    </a>

    <a class="btn c4" href="e5.html">
      <svg viewBox="0 0 24 24"><path d="M4 15l0 4l4 0"/><path d="M20 15l0 4l-4 0"/><path d="M4 11l16 0"/><path d="M4 15l16 0"/><rect x="4" y="5" width="16" height="10" rx="2"/><circle cx="8" cy="18" r="1"/><circle cx="16" cy="18" r="1"/><path d="M9 8l2 0"/><path d="M13 8l2 0"/></svg>
      <span class="label">Shinkansen<br>Crossing</span>
    </a>

    <a class="btn c5" href="mtr.html">
      <svg viewBox="0 0 24 24"><path d="M4 6h16a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2z"/><path d="M9 6v12"/><path d="M15 6v12"/><path d="M6 20l-2 2"/><path d="M18 20l2 2"/></svg>
      <span class="label">MTR Doors</span>
    </a>

    <a class="btn c6" href="panel.html">
      <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 8h.01"/><path d="M10 8h.01"/><path d="M14 8h.01"/><path d="M18 8h.01"/><path d="M6 12h.01"/><path d="M10 12h.01"/><path d="M14 12h.01"/><path d="M18 12h.01"/><path d="M6 16h.01"/><path d="M10 16h.01"/><path d="M14 16h.01"/><path d="M18 16h.01"/></svg>
      <span class="label">Shinkansen<br>LED Panel</span>
    </a>

    <a class="btn c7" href="rocket.html">
      <svg viewBox="0 0 24 24"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>
      <span class="label">Rocket<br>Launch</span>
    </a>

    <a class="btn c8" href="rr.html">
      <svg viewBox="0 0 24 24"><path d="M12 2v20"/><path d="M2 5h20"/><path d="M3 3l2 2-2 2"/><path d="M21 3l-2 2 2 2"/><path d="M3 17l2 2-2 2"/><path d="M21 17l-2 2 2 2"/><circle cx="12" cy="9" r="2"/><circle cx="12" cy="15" r="2"/></svg>
      <span class="label">Crossing<br>Control</span>
    </a>

    <a class="btn c9" href="neon.html">
      <svg viewBox="0 0 24 24"><line x1="6" y1="11" x2="10" y2="11"/><line x1="8" y1="9" x2="8" y2="13"/><line x1="15" y1="12" x2="15.01" y2="12"/><line x1="18" y1="10" x2="18.01" y2="10"/><path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z"/></svg>
      <span class="label">Obstacle<br>Dodger</span>
    </a>

    <a class="btn c10" href="shinkansen.html">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="6" r="4"/><path d="M12 10v4"/><path d="M8 20l4-6 4 6"/><path d="M5 14l3-2"/><path d="M19 14l-3-2"/><path d="M3 10l2-1.5"/><path d="M21 10l-2-1.5"/><path d="M7 3l-1-2"/><path d="M17 3l1-2"/></svg>
      <span class="label">Whack-a-<br>Train</span>
    </a>

  </div>
</div>
</body>
</html>
