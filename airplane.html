<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Little Captain — 747</title>
<style>
/* ═══ BASE ═══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100dvh;overflow:hidden;background:#0a0d14;
  font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
  -webkit-tap-highlight-color:transparent;touch-action:none;
  user-select:none;-webkit-user-select:none}
button{border:none;outline:none;background:none;-webkit-tap-highlight-color:transparent;cursor:pointer;font-family:inherit}
.screen{position:absolute;inset:0;overflow:hidden}
.screen.gone{display:none!important}

/* ═══ AIRLINE SELECTOR ═══ */
#scr-air{background:
  radial-gradient(ellipse 120% 60% at 50% -10%,#16305e 0%,transparent 60%),
  linear-gradient(170deg,#0b1530 0%,#0a1024 60%,#070b18 100%);
  display:flex;flex-direction:column;align-items:center;overflow-y:auto;touch-action:pan-y}
#air-h{font-size:26px;font-weight:900;letter-spacing:5px;color:#fff;
  text-align:center;padding:34px 20px 8px;text-shadow:0 2px 24px rgba(90,160,255,.4)}
#air-sub{font-size:12px;letter-spacing:3px;color:rgba(255,255,255,.4);margin-bottom:18px}
#a-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 12px 30px;width:100%;max-width:768px}
.at{background:#fff;border-radius:16px;min-height:128px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;padding:10px 4px;transition:transform .12s;
  box-shadow:0 3px 14px rgba(0,0,0,.45)}
.at:active{transform:scale(.92)}
.at img{width:78px;height:78px;object-fit:contain;pointer-events:none}
.at-n{font-size:10px;font-weight:800;letter-spacing:.4px;color:#333;
  text-align:center;text-transform:uppercase;line-height:1.3;pointer-events:none}

/* ═══ SIM LAYOUT ═══ */
#scr-sim{display:flex;flex-direction:column;background:#000}
#scene{position:relative;flex:1;overflow:hidden;min-height:0}
#annunc{height:64px;flex-shrink:0}
#panel{height:360px;flex-shrink:0;position:relative}

/* ═══ SCENE ═══ */
#sky{position:absolute;inset:0;
  background:linear-gradient(180deg,#3f7cc0 0%,#5b98d6 45%,#8cc2e8 75%,#b9e0f4 100%);
  transition:background 2.5s}
#sky.cruise{background:linear-gradient(180deg,#000d26 0%,#001d4d 35%,#003585 70%,#0055b8 100%)}
#stars{position:absolute;inset:0;opacity:0;transition:opacity 2s;pointer-events:none}
#stars.show{opacity:1}
#tarmac{position:absolute;left:0;right:0;bottom:0;height:30%;background:#54524f}
#tarmac::before{content:'';position:absolute;top:36%;left:0;right:0;height:5px;
  background:repeating-linear-gradient(90deg,#f5bd02 0,#f5bd02 34px,transparent 34px,transparent 74px)}
#horizon{position:absolute;left:0;right:0;bottom:0;height:38%;display:none;
  background:linear-gradient(180deg,#86ba58 0%,#5d8f40 35%,#47732e 100%)}
#gate-grp{position:absolute;inset:0;opacity:0;transition:opacity .6s;pointer-events:none}
#gate-grp.show{opacity:1}
#rwy-grp{position:absolute;inset:0;opacity:0;transition:opacity .9s;pointer-events:none}
#rwy-grp.show{opacity:1}
#roll-wrap{position:absolute;bottom:0;left:0;width:100%;height:34%;overflow:hidden;opacity:0;transition:opacity .3s}
#roll-wrap.show{opacity:1}
#roll-strip{position:absolute;bottom:0;left:0;width:300%;height:100%}
@keyframes rollScroll{from{transform:translateX(0)}to{transform:translateX(-33.333%)}}
#roll-strip.rolling{animation:rollScroll 1.1s linear infinite}
#clouds{position:absolute;top:18%;left:0;right:0;height:44%;opacity:0;transition:opacity 1s;pointer-events:none}
#clouds.show{opacity:1}
.cl{position:absolute}
@keyframes cld{from{transform:translateX(0)}to{transform:translateX(-220px)}}
#ceil{position:absolute;bottom:0;left:-50%;right:-50%;height:32%;opacity:0;transition:opacity 1.8s;pointer-events:none;
  background:linear-gradient(180deg,rgba(255,255,255,0),rgba(255,255,255,.4) 30%,#fff 70%)}
#ceil.show{opacity:1}

/* Push unit: truck + plane move as ONE */
#push-unit{position:absolute;left:50%;bottom:26%;width:600px;height:280px;
  transform:translateX(-52%);will-change:transform;z-index:5;pointer-events:none}
#ac-wrap{position:absolute;left:0;bottom:0;width:600px;height:280px;will-change:transform}
@keyframes tremble{0%,100%{transform:translateY(0)}50%{transform:translateY(1.6px)}}
#ac-wrap.rolling{animation:tremble .12s linear infinite}
#tow-wrap{position:absolute;right:-58px;bottom:8px;width:120px;opacity:0;transition:opacity .5s}
#tow-wrap.show{opacity:1}

/* Airborne: plane leaves the unit visually via unit transform */
#push-unit.flying{transition:bottom 2s ease,transform 1.6s ease}

/* ═══ HUD ═══ */
.hud{position:absolute;z-index:12;pointer-events:none;opacity:0;transition:opacity .5s}
.hud.hs{opacity:1}
#hud-alt{top:12px;left:12px;font-family:'SF Mono',Menlo,monospace;font-size:22px;font-weight:700;
  color:#00e880;letter-spacing:2px;background:rgba(0,0,0,.55);padding:5px 12px;border-radius:6px}
#hud-cmp{top:10px;right:104px;text-align:center}
#cmp-b{font-family:Menlo,monospace;font-size:17px;font-weight:700;color:#fff;margin-top:2px}
#cmp-p{font-family:Menlo,monospace;font-size:11px;color:rgba(255,255,255,.55);letter-spacing:2px}
#badge{top:10px;right:12px;width:80px;height:80px;background:#fff;border-radius:14px;
  display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.4)}
#badge img{width:64px;height:64px;object-fit:contain}
#hud-gate{top:46%;right:18px;font-family:Menlo,monospace;font-size:24px;font-weight:900;
  color:#ffe050;background:rgba(0,0,0,.75);padding:6px 14px;border-radius:6px;letter-spacing:2px}

/* ═══ SPEED BAR ═══ */
#spd-wrap{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);
  width:300px;z-index:15;opacity:0;transition:opacity .3s;pointer-events:none}
#spd-wrap.show{opacity:1}
#spd-track{height:34px;background:rgba(0,0,0,.65);border-radius:17px;
  border:2px solid rgba(255,255,255,.2);overflow:hidden;position:relative}
#spd-fill{height:100%;width:0%;border-radius:17px;
  background:linear-gradient(90deg,#1a44cc,#44aaff 45%,#ffdd00 75%,#ff6a00)}
#vr-zone{position:absolute;top:0;bottom:0;left:78%;right:0;
  background:rgba(64,255,110,.16);border-left:3px solid #40ff6e}
#vr-lbl{position:absolute;top:-20px;left:78%;font-family:Menlo,monospace;
  font-size:12px;font-weight:700;color:#40ff6e}
#spd-cap{font-family:Menlo,monospace;font-size:12px;color:rgba(255,255,255,.6);
  text-align:center;margin-top:5px;letter-spacing:3px}

/* ═══ ROTATE ═══ */
#rotate-b{position:absolute;top:34%;left:50%;transform:translate(-50%,-50%) scale(.85);
  font-size:56px;font-weight:900;letter-spacing:4px;color:#fff;
  text-shadow:0 0 30px rgba(80,255,120,.95);opacity:0;pointer-events:none;
  z-index:28;transition:opacity .2s,transform .2s;padding:20px 34px}
#rotate-b.show{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:auto;
  animation:rp .5s ease-in-out infinite alternate}
@keyframes rp{from{text-shadow:0 0 18px rgba(80,255,120,.7)}
  to{text-shadow:0 0 55px rgba(80,255,120,1);transform:translate(-50%,-53%) scale(1.06)}}

/* ═══ FEEDBACK WORDS ═══ */
#fb{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);
  font-size:74px;font-weight:900;letter-spacing:4px;opacity:0;
  pointer-events:none;z-index:30;transition:opacity .16s;white-space:nowrap;text-align:center}
#fb.show{opacity:1}
#fb.err{color:#ff3b30;text-shadow:0 0 30px rgba(255,50,40,.75)}
#fb.wait{color:#ffa722;text-shadow:0 0 30px rgba(255,160,30,.75)}
#fb.ok{color:#35e96b;text-shadow:0 0 34px rgba(50,230,105,.8)}
@keyframes flR{0%,100%{background:transparent}45%{background:rgba(255,30,20,.26)}}
@keyframes flA{0%,100%{background:transparent}45%{background:rgba(255,160,20,.2)}}
@keyframes flG{0%,100%{background:transparent}45%{background:rgba(40,230,100,.18)}}
#scene.f-r{animation:flR .4s ease}
#scene.f-a{animation:flA .4s ease}
#scene.f-g{animation:flG .5s ease}

/* ═══ OVERLAYS ═══ */
#taxi-ov{position:absolute;inset:0;background:#000;display:flex;align-items:center;
  justify-content:center;z-index:42;opacity:0;pointer-events:none;transition:opacity .8s}
#taxi-ov.show{opacity:1;pointer-events:auto}
#taxi-t{font-family:Menlo,monospace;font-size:26px;font-weight:900;
  letter-spacing:10px;color:rgba(255,255,255,.5)}
#end-ov{position:absolute;inset:0;background:rgba(0,8,32,.92);display:flex;
  flex-direction:column;align-items:center;justify-content:center;gap:28px;
  z-index:50;opacity:0;pointer-events:none;transition:opacity .9s}
#end-ov.show{opacity:1;pointer-events:auto}
#end-t{font-size:56px;font-weight:900;letter-spacing:4px;color:#ffd700;
  text-shadow:0 0 30px rgba(255,215,0,.5)}
#end-sil{width:220px;opacity:.9}
#end-btns{display:flex;gap:14px}
.end-b{font-size:17px;font-weight:800;letter-spacing:2px;color:#fff;
  border-radius:16px;padding:18px 30px;min-height:66px;min-width:150px}
#b-fly{background:#0a5c78}
#b-new{background:#3a1660}

/* ═══ MODE TOGGLE ═══ */
#mode{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:30;
  display:flex;gap:3px;background:rgba(0,0,0,.66);border-radius:18px;padding:4px}
.lvl{font-size:12px;font-weight:800;letter-spacing:1px;color:rgba(255,255,255,.42);
  border-radius:14px;padding:6px 16px;min-height:32px;transition:all .2s}
.lvl.on{color:#111;background:#e8e2d6}
.lvl.lkd{opacity:.3;pointer-events:none}

/* ═══ ANNUNCIATOR STRIP ═══ */
#annunc{background:linear-gradient(180deg,#23211e,#151412);
  border-top:2px solid #3a3733;display:flex;align-items:center;
  justify-content:space-around;padding:0 8px;gap:6px}
.ann-g{display:flex;align-items:center;gap:8px}
.ann-t{font-size:12px;font-weight:800;letter-spacing:2px;color:#8f897e}
.lamp{width:26px;height:26px;border-radius:50%;background:#1c1b19;
  border:2px solid #0c0b0a;box-shadow:inset 0 2px 4px rgba(0,0,0,.8);
  transition:background .3s,box-shadow .3s}
.lamp.grn{background:#3ee06a;box-shadow:0 0 12px rgba(60,225,105,.8),inset 0 -2px 4px rgba(0,80,20,.5)}
.lamp.amb{background:#ffb340;box-shadow:0 0 12px rgba(255,175,55,.8),inset 0 -2px 4px rgba(120,70,0,.5)}
.fl-cell{font-family:Menlo,monospace;font-size:15px;font-weight:700;color:#463f35;
  background:#1c1b19;border:2px solid #0c0b0a;border-radius:5px;padding:4px 9px;
  box-shadow:inset 0 2px 4px rgba(0,0,0,.8);transition:all .3s}
.fl-cell.lit{color:#3ee06a;text-shadow:0 0 8px rgba(60,225,105,.9)}

/* ═══ KORRY PANEL ═══ */
#panel{background:
  linear-gradient(180deg,#b3aca0 0%,#a49d90 8%,#9a9386 55%,#8b8478 100%);
  box-shadow:inset 0 3px 0 rgba(255,255,255,.25),inset 0 -4px 8px rgba(0,0,0,.25);
  padding:14px 12px 10px}
.screw{position:absolute;width:16px;height:16px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#c8c2b6,#6e685e 70%);
  box-shadow:inset 0 -1px 2px rgba(0,0,0,.5)}
.screw::after{content:'';position:absolute;left:2px;right:2px;top:6.5px;height:2.5px;
  background:#4a453d;border-radius:2px;transform:rotate(28deg)}
#panel .screw:nth-of-type(1){top:8px;left:10px}
#panel .screw:nth-of-type(2){top:8px;right:10px}
#panel .screw:nth-of-type(3){bottom:8px;left:10px}
#panel .screw:nth-of-type(4){bottom:8px;right:10px}
#p-title{text-align:center;font-size:13px;font-weight:800;letter-spacing:4px;
  color:#3a352d;margin-bottom:6px}
#k-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px 10px;
  border:2px solid rgba(255,255,255,.75);border-radius:10px;padding:10px 10px 12px;
  margin:0 18px;position:relative}
.kcell{display:flex;flex-direction:column;align-items:center;gap:5px}
.klbl{font-size:18px;font-weight:800;letter-spacing:2.5px;color:#2e2a24;
  text-align:center;line-height:1;pointer-events:none}
.korry{width:100%;max-width:150px;height:88px;border-radius:8px;position:relative;
  background:linear-gradient(160deg,#2a2a2a 0%,#161616 45%,#0c0c0c 100%);
  box-shadow:0 3px 5px rgba(0,0,0,.55),inset 0 1px 1px rgba(255,255,255,.14),
    inset 0 -2px 3px rgba(0,0,0,.7);
  border:2px solid #060606;
  display:flex;align-items:center;justify-content:center;
  transition:transform .08s,box-shadow .12s;touch-action:none}
.korry:active:not(.lkd){transform:translateY(2px);
  box-shadow:0 1px 2px rgba(0,0,0,.55),inset 0 2px 5px rgba(0,0,0,.8)}
.korry.lkd{opacity:.35;pointer-events:none}
.korry.held{transform:translateY(2px);
  box-shadow:0 1px 2px rgba(0,0,0,.55),inset 0 2px 6px rgba(0,0,0,.85)}
@keyframes wiggle{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.korry.resist{animation:wiggle .3s ease 2}
/* the glowing legend bar */
.kbar{width:72%;height:26px;border-radius:4px;position:relative;overflow:hidden;
  background:#141414;border:1.5px solid #050505;
  box-shadow:inset 0 2px 5px rgba(0,0,0,.9);
  display:flex;align-items:center;justify-content:center}
.kbar-fill{position:absolute;left:0;top:0;bottom:0;width:0%;background:rgba(80,225,120,.35)}
.kbar-t{position:relative;font-family:Menlo,monospace;font-size:13px;font-weight:700;
  letter-spacing:2px;color:#2f2f2f;transition:color .25s,text-shadow .25s;pointer-events:none}
.korry.lit .kbar-t{color:#5cf08a;text-shadow:0 0 10px rgba(80,240,130,.95)}
.korry.lit .kbar{box-shadow:inset 0 2px 5px rgba(0,0,0,.9),0 0 14px rgba(70,230,120,.35)}
.korry.lit-a .kbar-t{color:#ffbb4d;text-shadow:0 0 10px rgba(255,180,60,.95)}
@keyframes guide{from{box-shadow:inset 0 2px 5px rgba(0,0,0,.9)}
  to{box-shadow:inset 0 2px 5px rgba(0,0,0,.9),0 0 20px 4px rgba(70,230,120,.75)}}
.korry.guide .kbar{animation:guide .6s ease-in-out infinite alternate}
.korry.guide .kbar-t{color:#5cf08a;text-shadow:0 0 10px rgba(80,240,130,.95)}

/* ═══ ANNOUNCE DRAWER ═══ */
#ann-drawer{position:absolute;left:0;right:0;bottom:0;top:0;z-index:6;
  background:linear-gradient(180deg,#b3aca0,#8b8478);
  transform:translateY(102%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  padding:14px 12px;display:flex;flex-direction:column}
#ann-drawer.open{transform:translateY(0)}
#ad-title{text-align:center;font-size:13px;font-weight:800;letter-spacing:4px;color:#3a352d;margin-bottom:8px}
#ad-grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:10px 12px;
  border:2px solid rgba(255,255,255,.75);border-radius:10px;padding:12px;margin:0 18px 6px}
.acell{display:flex;flex-direction:column;align-items:center;gap:5px;justify-content:center}
#ad-close{margin:8px auto 0;font-size:14px;font-weight:800;letter-spacing:2px;
  color:#3a352d;padding:10px 30px;min-height:44px;border:2px solid #6a6459;border-radius:8px}
.korry.done .kbar-t{color:#8a8a55}
.korry.done{opacity:.55;pointer-events:none}
</style>
</head>
<body>

<!-- SELECTOR -->
<div class="screen" id="scr-air">
  <div id="air-h">CHOOSE YOUR AIRLINE</div>
  <div id="air-sub">BOEING 747 · CAPTAIN ASHER</div>
  <div id="a-grid"></div>
</div>

<!-- SIM -->
<div class="screen gone" id="scr-sim">
  <div id="scene">
    <div id="sky"></div>
    <div id="stars"></div>
    <div id="horizon"></div>
    <div id="tarmac"></div>
    <div id="gate-grp"></div>
    <div id="rwy-grp"></div>
    <div id="roll-wrap"><div id="roll-strip"></div></div>
    <div id="clouds"></div>
    <div id="push-unit">
      <div id="ac-wrap"></div>
      <div id="tow-wrap"></div>
    </div>
    <div id="ceil"></div>

    <div id="spd-wrap">
      <div id="vr-lbl">Vr</div>
      <div id="spd-track"><div id="spd-fill"></div><div id="vr-zone"></div></div>
      <div id="spd-cap">SPEED</div>
    </div>

    <button id="rotate-b">ROTATE ↑</button>
    <div id="fb"></div>
    <div id="taxi-ov"><div id="taxi-t">TAXIING…</div></div>
    <div id="end-ov">
      <div id="end-t">WELL DONE</div>
      <svg id="end-sil" viewBox="0 0 600 280"></svg>
      <div id="end-btns">
        <button class="end-b" id="b-fly">FLY AGAIN ↻</button>
        <button class="end-b" id="b-new">NEW AIRLINE →</button>
      </div>
    </div>

    <div class="hud" id="hud-alt">00000 FT</div>
    <div class="hud" id="hud-cmp"></div>
    <div class="hud hs" id="badge"></div>
    <div class="hud" id="hud-gate"></div>
    <div id="mode">
      <button class="lvl on" id="m-easy">EASY</button>
      <button class="lvl" id="m-norm">NORMAL</button>
    </div>
  </div>

  <!-- ANNUNCIATORS -->
  <div id="annunc">
    <div class="ann-g"><span class="ann-t">GEAR</span>
      <div class="lamp grn" id="lp-g1"></div>
      <div class="lamp grn" id="lp-g2"></div>
      <div class="lamp grn" id="lp-g3"></div>
    </div>
    <div class="ann-g"><span class="ann-t">FLAPS</span>
      <div class="fl-cell lit" id="fl-up">UP</div>
      <div class="fl-cell" id="fl-10">10</div>
    </div>
    <div class="ann-g"><span class="ann-t">BELT</span>
      <div class="lamp amb" id="lp-belt"></div>
    </div>
  </div>

  <!-- KORRY PANEL -->
  <div id="panel">
    <div class="screw"></div><div class="screw"></div>
    <div class="screw"></div><div class="screw"></div>
    <div id="p-title">FLIGHT CONTROL</div>
    <div id="k-grid">
      <div class="kcell"><div class="klbl">PUSH<br>BACK</div>
        <button class="korry lkd" id="k-push"><div class="kbar">
          <div class="kbar-fill" id="pf"></div><span class="kbar-t">PUSH</span></div></button></div>
      <div class="kcell"><div class="klbl">THRUST</div>
        <button class="korry lkd" id="k-thrust"><div class="kbar">
          <div class="kbar-fill" id="tf"></div><span class="kbar-t">HOLD</span></div></button></div>
      <div class="kcell"><div class="klbl">FLAPS</div>
        <button class="korry lkd" id="k-flaps"><div class="kbar">
          <span class="kbar-t" id="kt-flaps">UP</span></div></button></div>
      <div class="kcell"><div class="klbl">LDG<br>GEAR</div>
        <button class="korry lkd" id="k-gear"><div class="kbar">
          <span class="kbar-t" id="kt-gear">DOWN</span></div></button></div>
      <div class="kcell"><div class="klbl">SEAT<br>BELT</div>
        <button class="korry lkd" id="k-belt"><div class="kbar">
          <span class="kbar-t" id="kt-belt">ON</span></div></button></div>
      <div class="kcell"><div class="klbl">CABIN<br>PA</div>
        <button class="korry lkd" id="k-ann"><div class="kbar">
          <span class="kbar-t">SPEAK</span></div></button></div>
    </div>

    <!-- ANNOUNCE DRAWER -->
    <div id="ann-drawer">
      <div id="ad-title">CABIN ANNOUNCEMENTS</div>
      <div id="ad-grid">
        <div class="acell"><div class="klbl">DOORS</div>
          <button class="korry lkd" id="a-doors"><div class="kbar"><span class="kbar-t">SPEAK</span></div></button></div>
        <div class="acell"><div class="klbl">WELCOME</div>
          <button class="korry lkd" id="a-welcome"><div class="kbar"><span class="kbar-t">SPEAK</span></div></button></div>
        <div class="acell"><div class="klbl">TAKEOFF</div>
          <button class="korry lkd" id="a-takeoff"><div class="kbar"><span class="kbar-t">SPEAK</span></div></button></div>
        <div class="acell"><div class="klbl">CRUISE</div>
          <button class="korry lkd" id="a-cruise"><div class="kbar"><span class="kbar-t">SPEAK</span></div></button></div>
      </div>
      <button id="ad-close">CLOSE ▾</button>
    </div>
  </div>
</div>

 o.start();o.stop(A.currentTime+d+.02)}
function noisy(d,g=.1,fc=800){if(!A)return;
 const sz=Math.ceil(A.sampleRate*d),buf=A.createBuffer(1,sz,A.sampleRate),dt=buf.getChannelData(0);
 for(let i=0;i<sz;i++)dt[i]=Math.random()*2-1;
 const s=A.createBufferSource(),f=A.createBiquadFilter(),gn=A.createGain();
 f.type='bandpass';f.frequency.value=fc;s.buffer=buf;s.connect(f);f.connect(gn);gn.connect(A.destination);
 gn.gain.setValueAtTime(g,A.currentTime);gn.gain.exponentialRampToValueAtTime(.001,A.currentTime+d);
 s.start();s.stop(A.currentTime+d+.02)}
let humO=null,humG=null;
function humOn(){if(!A||humO)return;humG=A.createGain();humG.gain.value=0;humG.connect(A.destination);
 humO=A.createOscillator();humO.type='sawtooth';humO.frequency.value=110;humO.connect(humG);humO.start();
 humG.gain.linearRampToValueAtTime(.05,A.currentTime+2)}
function humOff(){if(!humG)return;humG.gain.linearRampToValueAtTime(0,A.currentTime+1.5);
 setTimeout(()=>{try{humO.stop()}catch(e){}humO=null;humG=null},1900)}

 spool:()=>{tone(75,2.2,'sawtooth',.13,230);noisy(2.2,.05)},
 gearMove:()=>{noisy(.35,.13);tone(180,.35,'sine',.09);setTimeout(()=>tone(240,.18,'sine',.08),350)},

 big:()=>{[523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,.3,'sine',.14),i*110))},

 horn:()=>{let n=0;const iv=setInterval(()=>{tone(244,.22,'square',.13);if(++n>=4)clearInterval(iv)},300)},

function speak(t,rate=.88,pitch=1,cb=null){
 if(!window.speechSynthesis){if(cb)setTimeout(cb,1200);return}
 window.speechSynthesis.cancel();
 const u=new SpeechSynthesisUtterance(t);u.rate=rate;u.pitch=pitch;
 u.onend=()=>{cb&&cb()};u.onerror=()=>{cb&&cb()};
 window.speechSynthesis.speak(u)}

function wrong(act){

  const map={DOORS:'k-ann',PUSH:'k-push',SPEAK:'k-ann',FLAPS:'k-flaps',HOLD:'k-thrust'};

function lockAll(){KEYS.forEach(id=>{const b=$(id);b.classList.add('lkd');b.classList.remove('guide','held')})}
function unlock(...ids){ids.forEach(id=>$(id).classList.remove('lkd'))}
function guide(...ids){if(level==='easy')ids.forEach(id=>$(id).classList.add('guide'))}
function updBtns(){
 lockAll();
 switch(ST){
  case S.GATE:unlock('k-ann','k-belt');guide('k-ann');break;
  case S.PUSHRDY:unlock('k-push','k-belt');guide('k-push');break;
  case S.WELRDY:unlock('k-ann','k-belt');guide('k-ann');break;
  case S.HOLD:unlock('k-ann','k-flaps','k-gear','k-belt');guide(flap10?'k-ann':'k-flaps');break;
  case S.TORDY:unlock('k-thrust','k-gear');guide('k-thrust');break;
  case S.ROLL:unlock('k-thrust','k-gear');break;
  case S.AIRB:unlock('k-gear','k-belt');guide('k-gear');break;
  case S.CLIMB:unlock('k-flaps','k-belt');guide('k-flaps');break;
  case S.CRUISE:unlock('k-ann','k-belt');guide('k-ann');break;
 }
 const lk=(ST===S.ROLL||ST===S.PUSHING);
 $$('.lvl').forEach(b=>b.classList.toggle('lkd',lk));
 updDrawer()}
function updDrawer(){
 const av={doors:ST===S.GATE&&!done.doors,welcome:ST===S.WELRDY&&!done.welcome,
  takeoff:ST===S.HOLD&&flap10&&!done.takeoff,cruise:ST===S.CRUISE&&!done.cruise};
 ['doors','welcome','takeoff','cruise'].forEach(k=>{
  const b=$('a-'+k);
  b.className='korry'+(done[k]?' done':av[k]?' lit':' lkd');b.querySelector('.kbar-t').textContent=done[k]?'DONE':'SPEAK'})}
function openDrawer(){$('ann-drawer').classList.add('open');updDrawer()}
function closeDrawer(){$('ann-drawer').classList.remove('open')}

/* ═══ FLOW ═══ */
function goTo(s){ST=s;updBtns()}
function enterGate(){
 goTo(S.GATE);shGate();
 gearDown=true;flap10=false;beltOn=true;
 updDoor(true);updGear();updFlaps();
 $('lp-belt').className='lamp amb';$('kt-belt').textContent='ON';$('k-belt').classList.add('lit-a');
 const u=$('push-unit');
 u.className='';u.style.transition='none';u.style.transform='translateX(-52%)';u.style.bottom='26%';
 $('tow-wrap').classList.remove('show');
 requestAnimationFrame(()=>{u.style.transition=''})}
function doDoors(){
 goTo(S.DOORS);lockAll();
 speak('Cabin doors are now closed and cross-checked. Please make sure your seatbelt is fastened.',.88,1,()=>{
  updDoor(false);
  const jb=document.getElementById('jb');
  if(jb){jb.style.transform='translateX(118px)';jb.style.opacity='0'}
  setTimeout(()=>{fb('SEALED','ok');SFX.big();
   $('tow-wrap').classList.add('show');
   goTo(S.PUSHRDY)},1900)})}
function setPushPos(){
 // travel 0..100% maps to translateX -52% .. -118% (plane+truck as one unit)
 $('push-unit').style.transform=`translateX(calc(-52% - ${pushProg*3.96}px))`}
function pushStart(){
 goTo(S.PUSHING);
 if(pushProg===0){SFX.spool();humOn()}
 beepT=setInterval(SFX.beep,700)}
function pushPause(){
 clearInterval(beepT);beepT=null;
 goTo(S.PUSHRDY)}   // unit stays exactly where JS left it
function pushDone(){
 clearInterval(beepT);beepT=null;
 $('tow-wrap').classList.remove('show');
 fb('READY','ok');SFX.big();
 goTo(S.WELRDY)}
function doWelcome(){
 goTo(S.PRETAXI);lockAll();
 speak(`Good ${tod()}, ladies and gentlemen. Welcome aboard ${AL.name}. Our flying time today will be smooth and easy. We'll be on our way shortly.`,.88,1,()=>{
  $('taxi-ov').classList.add('show');
  setTimeout(()=>{
   const u=$('push-unit');
   u.style.transition='none';u.className='';
   u.style.transform='translateX(-52%)';u.style.bottom='26%';
   shRwy();updDoor(false);
   requestAnimationFrame(()=>{u.style.transition=''});
   setTimeout(()=>{
    $('taxi-ov').classList.remove('show');
    setTimeout(()=>goTo(S.HOLD),400)},1300)},900)})}
function doTakeoffAnn(){
 goTo(S.TORDY);lockAll();
 speak('Cabin crew, please be seated for takeoff.',.88,1,()=>{
  setTimeout(()=>{
   atc(`${AL.cs} ${AL.flt}, runway ${RWY_SP[AL.rwy]||AL.rwy}, cleared for takeoff.`,()=>{
    done.takeoff=true;fb('GO','ok');goTo(S.TORDY)})},1200)})}

/* PUSH hold */
function pushHoldStart(){
 if(ST!==S.PUSHRDY)return;
 pushHeld=true;$('k-push').classList.add('held');
 pushStart();
 pushT=setInterval(()=>{
  pushProg=Math.min(100,pushProg+1);
  $('pf').style.width=pushProg+'%';
  setPushPos();
  if(pushProg>=100){clearInterval(pushT);pushT=null;pushDone();
   $('k-push').classList.remove('held');$('pf').style.width='0%'}},50)}
function pushHoldEnd(){
 if(!pushHeld)return;pushHeld=false;
 clearInterval(pushT);pushT=null;
 $('k-push').classList.remove('held');
 if(ST===S.PUSHING){pushPause()}}

/* THRUST hold + rotate window */
function thrustHoldStart(){
 if(ST!==S.TORDY&&ST!==S.ROLL)return;
 if(ST===S.TORDY){goTo(S.ROLL);shRoll();$('ac-wrap').classList.add('rolling');SFX.spool();humOn()}
 thrustHeld=true;$('k-thrust').classList.add('held');
 clearInterval(decayT);decayT=null;
 const total=level==='easy'?2400:5200;
 thrustT=setInterval(()=>{
  thrustProg=Math.min(100,thrustProg+(50/total*100));
  $('tf').style.width=thrustProg+'%';
  $('spd-fill').style.width=thrustProg+'%';
  chkVr()},50)}
function thrustHoldEnd(){
 if(!thrustHeld)return;thrustHeld=false;
 clearInterval(thrustT);thrustT=null;
 $('k-thrust').classList.remove('held');
 if(ST===S.ROLL){
  decayT=setInterval(()=>{
   thrustProg=Math.max(0,thrustProg-1.4);
   $('tf').style.width=thrustProg+'%';
   $('spd-fill').style.width=thrustProg+'%';
   chkVr();
   if(thrustProg<=0||ST!==S.ROLL)clearInterval(decayT)},90)}}
function chkVr(){
 const inZone=thrustProg>=78;
 if(inZone&&!vrOn){vrOn=true;$('rotate-b').classList.add('show');SFX.rotateF();
  if(level==='easy')setTimeout(()=>{if(ST===S.ROLL&&thrustProg>=78)doRotate()},1150)}
 else if(!inZone&&vrOn&&thrustProg<70){vrOn=false;$('rotate-b').classList.remove('show')}}
function doRotate(){
 if(ST!==S.ROLL)return;
 vrOn=false;$('rotate-b').classList.remove('show');
 clearInterval(thrustT);thrustT=null;thrustHeld=false;
 clearInterval(decayT);decayT=null;
 $('k-thrust').classList.remove('held');$('tf').style.width='0%';
 $('ac-wrap').classList.remove('rolling');
 goTo(S.AIRB);shAir();
 fb('UP','ok');SFX.big();humOff()}

/* GEAR */
function gearUpInAir(){
 gearDown=false;SFX.gearMove();gearTransit();
 $('kt-gear').textContent='UP';$('k-gear').classList.remove('lit');
 fb('GEAR UP','ok');
 goTo(S.CLIMB);shClimb();
 altStart()}
function gearResist(){
 SFX.horn();
 const b=$('k-gear');b.classList.remove('resist');void b.offsetWidth;b.classList.add('resist');
 ['lp-g1','lp-g2','lp-g3'].forEach(id=>{$(id).className='lamp amb';
  setTimeout(()=>$(id).className='lamp grn',1600)});
 fb('WAIT','wait')}
function altStart(){
 alt=0;
 altT=setInterval(()=>{
  alt=Math.min(35000,alt+180);
  $('hud-alt').textContent=String(alt).padStart(5,'0')+' FT';
  if(alt>=35000){clearInterval(altT);altT=null}},100)}

/* CLIMB→CLEAN→CRUISE */
function flapsClean(){
 flap10=false;SFX.flap();updFlaps();
 goTo(S.CLEAN);lockAll();
 setTimeout(()=>{shCruise();
  fb('CRUISE','ok');SFX.cruiseJ();
  goTo(S.CRUISE)},2100)}

/* ═══ HANDLERS ═══ */
function hPushS(e){e.preventDefault();initA();
 if(ST===S.PUSHRDY)pushHoldStart();
 else{fb('DOORS','err');wrong('DOORS')}}
function hPushE(e){e&&e.preventDefault();pushHoldEnd()}
function hThrS(e){e.preventDefault();initA();
 if(ST===S.TORDY||ST===S.ROLL)thrustHoldStart();
 else if(ST===S.GATE){fb('DOORS','err');wrong('DOORS')}
 else if(ST===S.PUSHRDY||ST===S.PUSHING){fb('PUSH','err');wrong('PUSH')}
 else if(ST===S.WELRDY){fb('SPEAK','err');wrong('SPEAK')}
 else if(ST===S.HOLD){
  if(!flap10){fb('FLAPS','wait');wrong('FLAPS')}
  else{fb('SPEAK','err');wrong('SPEAK')}}
 else{fb('WAIT','wait')}}
function hThrE(e){e&&e.preventDefault();thrustHoldEnd()}
function hFlaps(e){e.preventDefault();initA();
 if(ST===S.HOLD){flap10=!flap10;SFX.flap();updFlaps();updBtns()}
 else if(ST===S.CLIMB){flapsClean()}
 else{fb('WAIT','wait');wrong('WAIT')}}
function hGear(e){e.preventDefault();initA();
 if(ST===S.AIRB)gearUpInAir();
 else if(gearDown&&(ST===S.HOLD||ST===S.ROLL||ST===S.GATE||ST===S.PUSHRDY||ST===S.PUSHING||ST===S.WELRDY||ST===S.TORDY))
  gearResist();
 else{fb('WAIT','wait')}}
function hBelt(e){e.preventDefault();initA();
 if(ST===S.GATE||ST===S.PUSHRDY||ST===S.WELRDY||ST===S.HOLD||ST===S.CRUISE){beltOn=!beltOn;updBelt()}}
function hAnn(e){e.preventDefault();initA();
 if($('k-ann').classList.contains('lkd'))return;
 openDrawer()}
function hADoors(e){e.preventDefault();
 if(done.doors||ST!==S.GATE)return;
 done.doors=true;closeDrawer();doDoors()}
function hAWel(e){e.preventDefault();
 if(done.welcome||ST!==S.WELRDY)return;
 done.welcome=true;closeDrawer();doWelcome()}
function hATO(e){e.preventDefault();
 if(done.takeoff||ST!==S.HOLD)return;
 if(!flap10){fb('FLAPS','wait');closeDrawer();return}
 closeDrawer();doTakeoffAnn()}
function hACruise(e){e.preventDefault();
 if(done.cruise||ST!==S.CRUISE)return;
 done.cruise=true;closeDrawer();
 lockAll();
 speak('We have now reached our cruising altitude of thirty five thousand feet. The fasten seatbelt sign is now off. Sit back, relax, and enjoy the flight.',.88,1,()=>{
  beltOn=false;updBelt();
  goTo(S.END);
  setTimeout(()=>$('end-ov').classList.add('show'),800)})}
function hRotate(e){e.preventDefault();initA();
 if($('rotate-b').classList.contains('show'))doRotate()}
function hFly(){$('end-ov').classList.remove('show');resetAll();setTimeout(enterGate,300)}
function hNew(){$('end-ov').classList.remove('show');
 $('scr-sim').classList.add('gone');$('scr-air').classList.remove('gone');resetAll()}

function resetAll(){
 ST=S.AIR;gearDown=true;flap10=false;beltOn=true;doorOpen=true;
 done={doors:false,welcome:false,takeoff:false,cruise:false};
 pushProg=0;thrustProg=0;vrOn=false;alt=0;
 [altT,pushT,thrustT,decayT,beepT].forEach(t=>clearInterval(t));
 altT=pushT=thrustT=decayT=beepT=null;
 pushHeld=thrustHeld=false;wrongN={};wrongLast=null;
 humOff();try{speechSynthesis.cancel()}catch(e){}
 $('fb').className='';$('rotate-b').classList.remove('show');
 $('taxi-ov').classList.remove('show');$('end-ov').classList.remove('show');
 $('spd-wrap').classList.remove('show');
 $('spd-fill').style.width='0%';$('pf').style.width='0%';$('tf').style.width='0%';
 $('push-unit').style.transform='translateX(-52%)';
 $('hud-alt').textContent='00000 FT';
 ['hud-alt','hud-cmp','hud-gate'].forEach(id=>$(id).classList.remove('hs'));
 closeDrawer()}

/* ═══ BIND ═══ */
function hold(el,s,e){
 el.addEventListener('touchstart',s,{passive:false});
 el.addEventListener('touchend',e,{passive:false});
 el.addEventListener('touchcancel',e,{passive:false});
 el.addEventListener('mousedown',s);el.addEventListener('mouseup',e);el.addEventListener('mouseleave',e)}
function tap(el,f){el.addEventListener('touchend',ev=>{ev.preventDefault();f(ev)},{passive:false});
 el.addEventListener('click',f)}
function bindAll(){
 hold($('k-push'),hPushS,hPushE);
 hold($('k-thrust'),hThrS,hThrE);
 tap($('k-flaps'),hFlaps);tap($('k-gear'),hGear);
 tap($('k-belt'),hBelt);tap($('k-ann'),hAnn);
 tap($('a-doors'),hADoors);tap($('a-welcome'),hAWel);
 tap($('a-takeoff'),hATO);tap($('a-cruise'),hACruise);
 tap($('ad-close'),()=>closeDrawer());
 tap($('rotate-b'),hRotate);
 tap($('b-fly'),hFly);tap($('b-new'),hNew);
 tap($('m-easy'),()=>setLvl('easy'));tap($('m-norm'),()=>setLvl('normal'))}
let bound=false;
function setLvl(l){level=l;
 $('m-easy').classList.toggle('on',l==='easy');
 $('m-norm').classList.toggle('on',l==='normal');
 updBtns()}

/* ═══ INIT ═══ */
function grid(){
 const g=$('a-grid');g.innerHTML='';
 AIRLINES.forEach(al=>{
  const t=document.createElement('button');t.className='at';
  t.innerHTML=`<img src="${LOGOS[al.id]}" alt=""><div class="at-n">${al.name}</div>`;
  tap(t,()=>{initA();pick(al)});
  g.appendChild(t)})}
function pick(al){
 AL=al;
 $('scr-air').classList.add('gone');
 $('scr-sim').classList.remove('gone');
 populate();
 if(!bound){bindAll();bound=true}
 setTimeout(enterGate,150)}
grid();
</script>
</body>
