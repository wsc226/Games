<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shinkansen Pixel Runner</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            position: fixed;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: corner-detecting;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffffff;
            font-size: 26px;
            font-weight: bold;
            text-shadow: 3px 3px 0px #000;
            z-index: 5;
            pointer-events: none;
        }

        #controls-container {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 130px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 5;
        }

        .btn {
            width: 130px;
            height: 110px;
            background-color: rgba(0, 0, 0, 0.6);
            border: 4px solid #fff;
            border-radius: 15px;
            color: white;
            font-size: 32px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 0px #000;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0px #000;
            background-color: rgba(255, 255, 255, 0.3);
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
            text-align: center;
        }

        .screen h1 {
            font-size: 54px;
            margin-bottom: 5px;
            color: #00d2d3;
            text-shadow: 4px 4px 0px #000;
            letter-spacing: 2px;
        }

        .screen p {
            font-size: 22px;
            margin-bottom: 30px;
            color: #ccc;
        }

        .menu-btn {
            padding: 20px 50px;
            font-size: 28px;
            font-weight: bold;
            background-color: #ff4757;
            color: white;
            border: 4px solid #fff;
            box-shadow: 0 8px 0px #000;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .menu-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0px #000;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud">CROSSINGS AVOIDED: <span id="score-val">0</span></div>

        <canvas id="gameCanvas"></canvas>

        <div id="controls-container">
            <div id="btn-up" class="btn">▲</div>
            <div id="btn-down" class="btn">▼</div>
        </div>

        <div id="start-screen" class="screen">
            <h1>SHINKANSEN RUNNER</h1>
            <p>Avoid the Japanese Railway Crossbucks!</p>
            <button id="btn-start" class="menu-btn">START GAME</button>
        </div>

        <div id="game-over-screen" class="screen hidden">
            <h1>GAME OVER</h1>
            <p>Crossings Avoided: <span id="final-score">0</span></p>
            <button id="btn-restart" class="menu-btn" style="background-color: #2ed573;">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;

        const scoreVal = document.getElementById('score-val');
        const finalScore = document.getElementById('final-score');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        
        const btnUp = document.getElementById('btn-up');
        const btnDown = document.getElementById('btn-down');
        const btnStart = document.getElementById('btn-start');
        const btnRestart = document.getElementById('btn-restart');

        let grassTopHeight, grassBottomHeight, trackZoneHeight, trackSpacing;
        let trackPositions = [];

        function calculateLayout() {
            grassTopHeight = canvas.height * 0.25;
            grassBottomHeight = canvas.height * 0.25;
            trackZoneHeight = canvas.height - grassTopHeight - grassBottomHeight;
            trackSpacing = trackZoneHeight / 4;

            trackPositions = [
                grassTopHeight + (trackSpacing * 0.5),
                grassTopHeight + (trackSpacing * 1.5),
                grassTopHeight + (trackSpacing * 2.5),
                grassTopHeight + (trackSpacing * 3.5)
            ];

            if(player) {
                player.x = 80;
                // Dynamically adjust train heights to match 55% of track space (never overflows)
                player.height = Math.floor(trackSpacing * 0.55);
                player.width = player.height * 2.8; 
                player.y = trackPositions[player.currentTrack] - (player.height / 2);
            }
        }

        const TRAIN_DATABASE = [
            {
                id: "E5",
                name: "E5 Series Hayabusa",
                primaryColor: "#00a896", 
                stripeColor: "#ff007f",  
                baseColor: "#e5e5e5"    
            }
        ];
        
        let selectedTrainIndex = 0;
        let gameActive = false;
        let score = 0;
        let obstacles = [];
        let bushes = [];
        let spawnTimer = 0;
        let spawnInterval = 65;
        let gameSpeed = 8;

        const player = {
            width: 110, 
            height: 30,
            currentTrack: 1, 
            x: 80,
            y: 0
        };

        // Finer, much more detailed pixel architecture for the train nose
        function drawPixelTrain(x, y, w, h, trainConfig) {
            let p = Math.max(1, Math.floor(h / 12)); // Finer pixel grid size
            
            // 1. Main teal body shell
            ctx.fillStyle = trainConfig.primaryColor;
            ctx.fillRect(x, y, w - (6 * p), h * 0.5);
            ctx.fillRect(x + w - (6 * p), y + (2 * p), 4 * p, (h * 0.5) - (2 * p));
            ctx.fillRect(x + w - (2 * p), y + (4 * p), 2 * p, (h * 0.5) - (4 * p));
            
            // 2. Crisp, thin pink stripe
            ctx.fillStyle = trainConfig.stripeColor;
            ctx.fillRect(x, y + Math.floor(h * 0.5), w, p);

            // 3. Light gray bottom underbelly
            ctx.fillStyle = trainConfig.baseColor;
            ctx.fillRect(x, y + Math.floor(h * 0.5) + p, w - (2 * p), Math.floor(h * 0.5) - p);
            
            // Black bogies/wheels hidden under base
            ctx.fillStyle = "#111";
            ctx.fillRect(x + (2 * p), y + h - p, 4 * p, p);
            ctx.fillRect(x + w - (8 * p), y + h - p, 4 * p, p);

            // 4. Sleek cockpit windows
            ctx.fillStyle = "#1a252f";
            ctx.fillRect(x + w - (10 * p), y + (2 * p), 3 * p, 2 * p);

            // 5. Clean, aligned side passenger windows
            ctx.fillStyle = "#2c3e50";
            let windowWidth = 4 * p;
            let windowHeight = 3 * p;
            let gap = 3 * p;
            for(let sx = x + (4 * p); sx < x + w - (16 * p); sx += (windowWidth + gap)) {
                ctx.fillRect(sx, y + (2 * p), windowWidth, windowHeight);
            }
        }

        // Floating Pixelated "X" Crossbuck only—no pole support
        function drawPixelCrossbuck(x, y, size) {
            let p = Math.max(1, Math.floor(size / 10)); // Fine rendering block
            
            ctx.save();
            ctx.translate(x + size/2, y + size/2);
            
            // Outer yellow cross borders
            ctx.fillStyle = "#f1c40f";
            for (let i = -4; i <= 4; i++) {
                ctx.fillRect((i * p) - p, (i * p) - p, 3 * p, 3 * p);
                ctx.fillRect((i * p) - p, (-i * p) - p, 3 * p, 3 * p);
            }

            // Inner black core stripes
            ctx.fillStyle = "#111111";
            for (let i = -4; i <= 4; i++) {
                ctx.fillRect(i * p, i * p, p, p);
                ctx.fillRect(i * p, -i * p, p, p);
            }
            
            ctx.restore();
        }

        btnUp.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!gameActive) return;
            if (player.currentTrack > 0) {
                player.currentTrack--;
                player.y = trackPositions[player.currentTrack] - (player.height / 2);
            }
        }, { passive: false });

        btnDown.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!gameActive) return;
            if (player.currentTrack < 3) {
                player.currentTrack++;
                player.y = trackPositions[player.currentTrack] - (player.height / 2);
            }
        }, { passive: false });

        btnStart.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startScreen.classList.add('hidden');
            resetGame();
        }, { passive: false });

        btnRestart.addEventListener('touchstart', (e) => {
            e.preventDefault();
            gameOverScreen.classList.add('hidden');
            resetGame();
        }, { passive: false });

        function resetGame() {
            score = 0;
            obstacles = [];
            bushes = [];
            gameSpeed = 8;
            spawnTimer = 0;
            player.currentTrack = 1;
            scoreVal.textContent = score;
            calculateLayout();
            gameActive = true;
            animate();
        }

        function animate() {
            if (!gameActive) return;

            // Render environmental grass
            ctx.fillStyle = "#2ecc71"; 
            ctx.fillRect(0, 0, canvas.width, grassTopHeight);
            ctx.fillRect(0, canvas.height - grassBottomHeight, canvas.width, grassBottomHeight);
            
            // Concrete tracks zone
            ctx.fillStyle = "#bdc3c7"; 
            ctx.fillRect(0, grassTopHeight, canvas.width, trackZoneHeight);

            // Clean, dark-gray inner rail tracks lines
            ctx.fillStyle = "#7f8c8d";
            for(let i = 0; i < 4; i++) {
                ctx.fillRect(0, trackPositions[i] - 2, canvas.width, 4);
            }

            // Pixelated bushes scrolling by
            if (Math.random() < 0.03) {
                let isTop = Math.random() > 0.5;
                bushes.push({
                    x: canvas.width,
                    y: isTop ? Math.random() * (grassTopHeight - 30) : canvas.height - grassBottomHeight + 10 + Math.random() * (grassBottomHeight - 40),
                    size: Math.random() * (35 - 20) + 20
                });
            }
            
            ctx.fillStyle = "#27ae60"; 
            for(let b = bushes.length - 1; b >= 0; b--) {
                bushes[b].x -= gameSpeed;
                ctx.fillRect(bushes[b].x, bushes[b].y, bushes[b].size, bushes[b].size * 0.8);
                if (bushes[b].x + bushes[b].size < 0) bushes.splice(b, 1);
            }

            // Draw player train perfectly sized within the single track spacing bounds
            drawPixelTrain(player.x, player.y, player.width, player.height, TRAIN_DATABASE[selectedTrainIndex]);

            // Spawn Crossbucks
            spawnTimer++;
            if (spawnTimer >= spawnInterval) {
                let randomTrack = Math.floor(Math.random() * 4);
                let size = Math.floor(trackSpacing * 0.5); // Perfectly matches scaled bounds
                obstacles.push({
                    x: canvas.width,
                    y: trackPositions[randomTrack] - (size / 2),
                    size: size,
                    track: randomTrack
                });
                spawnTimer = 0;
                gameSpeed += 0.15;
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.x -= gameSpeed;

                // Render standalone "X" icon safely
                drawPixelCrossbuck(obs.x, obs.y, obs.size);

                // Precise Hitbox Calculations
                if (
                    player.currentTrack === obs.track &&
                    player.x + player.width > obs.x &&
                    player.x < obs.x + obs.size
                ) {
                    gameActive = false;
                    finalScore.textContent = score;
                    gameOverScreen.classList.remove('hidden');
                    return;
                }

                if (obs.x + obs.size < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreVal.textContent = score;
                }
            }

            requestAnimationFrame(animate);
        }

        window.addEventListener('load', () => {
            resizeCanvas();
        });
        resizeCanvas();
    </script>
</body>
</html>
