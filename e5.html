<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shinkansen Pixel Runner v3</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            position: fixed;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: corner-detecting;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffffff;
            font-size: 26px;
            font-weight: bold;
            text-shadow: 3px 3px 0px #000;
            z-index: 5;
            pointer-events: none;
            line-height: 1.4;
        }

        #controls-container {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 130px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 5;
        }

        .btn {
            width: 130px;
            height: 110px;
            background-color: rgba(0, 0, 0, 0.6);
            border: 4px solid #fff;
            border-radius: 15px;
            color: white;
            font-size: 32px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 0px #000;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0px #000;
            background-color: rgba(255, 255, 255, 0.3);
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
            text-align: center;
        }

        .screen h1 {
            font-size: 54px;
            margin-bottom: 5px;
            color: #00d2d3;
            text-shadow: 4px 4px 0px #000;
            letter-spacing: 2px;
        }

        .screen p {
            font-size: 22px;
            margin-bottom: 30px;
            color: #ccc;
        }

        .menu-btn {
            padding: 20px 50px;
            font-size: 28px;
            font-weight: bold;
            background-color: #ff4757;
            color: white;
            border: 4px solid #fff;
            box-shadow: 0 8px 0px #000;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .menu-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0px #000;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud">
            <div>LEVEL: <span id="level-val">1</span></div>
            <div>CROSSINGS AVOIDED: <span id="score-val">0</span></div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="controls-container">
            <div id="btn-up" class="btn">▲</div>
            <div id="btn-down" class="btn">▼</div>
        </div>

        <div id="start-screen" class="screen">
            <h1>SHINKANSEN RUNNER</h1>
            <p>Avoid the Japanese Railway Crossbucks!</p>
            <button id="btn-start" class="menu-btn">START GAME</button>
        </div>

        <div id="game-over-screen" class="screen hidden">
            <h1>GAME OVER</h1>
            <p>Crossings Avoided: <span id="final-score">0</span></p>
            <p style="font-size: 18px; color: #ff4757;">Reached Level <span id="final-level">1</span></p>
            <button id="btn-restart" class="menu-btn" style="background-color: #2ed573;">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;

        const scoreVal = document.getElementById('score-val');
        const levelVal = document.getElementById('level-val');
        const finalScore = document.getElementById('final-score');
        const finalLevel = document.getElementById('final-level');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        
        const btnUp = document.getElementById('btn-up');
        const btnDown = document.getElementById('btn-down');
        const btnStart = document.getElementById('btn-start');
        const btnRestart = document.getElementById('btn-restart');

        let grassTopHeight, grassBottomHeight, trackZoneHeight, trackSpacing;
        let trackPositions = [];

        function calculateLayout() {
            grassTopHeight = canvas.height * 0.25;
            grassBottomHeight = canvas.height * 0.25;
            trackZoneHeight = canvas.height - grassTopHeight - grassBottomHeight;
            trackSpacing = trackZoneHeight / 4;

            trackPositions = [
                grassTopHeight + (trackSpacing * 0.5),
                grassTopHeight + (trackSpacing * 1.5),
                grassTopHeight + (trackSpacing * 2.5),
                grassTopHeight + (trackSpacing * 3.5)
            ];

            if(player) {
                player.x = 80;
                player.height = Math.floor(trackSpacing * 0.55);
                player.width = player.height * 2.8; 
                player.y = trackPositions[player.currentTrack] - (player.height / 2);
            }
        }

        const TRAIN_DATABASE = [
            {
                id: "E5",
                name: "E5 Series Hayabusa",
                primaryColor: "#00a896", 
                stripeColor: "#ff007f",  
                baseColor: "#e5e5e5"    
            }
        ];
        
        let selectedTrainIndex = 0;
        let gameActive = false;
        let score = 0;
        let currentLevel = 1;
        let obstacles = [];
        let bushes = [];
        let spawnTimer = 0;
        
        // Dynamic game mechanics controls
        let baseSpeed = 3.2;      // Much slower starter speed for toddlers
        let gameSpeed = baseSpeed;
        let spawnInterval = 120;  // Spaced out obstacle spawns for child reaction times
        let levelUpFlashTimer = 0; // Text effect duration tracker

        const player = {
            width: 110, 
            height: 30,
            currentTrack: 1, 
            x: 80,
            y: 0
        };

        // Fine high-res pixel art loop rendering for the Shinkansen
        function drawPixelTrain(x, y, w, h, trainConfig) {
            // Highly fine scale factor creating 100x the details inside bounds
            let p = h / 28; 
            
            // Aerodynamic sleek upper body contour mapping
            ctx.fillStyle = trainConfig.primaryColor;
            ctx.fillRect(x, y + (4 * p), w - (12 * p), 10 * p);
            ctx.fillRect(x + w - (12 * p), y + (6 * p), 4 * p, 8 * p);
            ctx.fillRect(x + w - (8 * p), y + (8 * p), 4 * p, 6 * p);
            ctx.fillRect(x + w - (4 * p), y + (10 * p), 4 * p, 4 * p);
            
            // Razor thin high-contrast accent color stripe
            ctx.fillStyle = trainConfig.stripeColor;
            ctx.fillRect(x, y + (14 * p), w, 2 * p);

            // Detailed underchassis lower half base
            ctx.fillStyle = trainConfig.baseColor;
            ctx.fillRect(x, y + (16 * p), w - (2 * p), 10 * p);
            
            // Multiple micro black wheel trucks
            ctx.fillStyle = "#111";
            ctx.fillRect(x + (6 * p), y + (26 * p), 8 * p, 2 * p);
            ctx.fillRect(x + (20 * p), y + (26 * p), 8 * p, 2 * p);
            ctx.fillRect(x + w - (24 * p), y + (26 * p), 8 * p, 2 * p);

            // Refined dark cockpit window layout
            ctx.fillStyle = "#1a252f";
            ctx.fillRect(x + w - (20 * p), y + (7 * p), 5 * p, 3 * p);

            // Finer, smaller square window details evenly arrays across hull
            ctx.fillStyle = "#2c3e50";
            let winW = 5 * p;
            let winH = 5 * p;
            let gap = 4 * p;
            for(let sx = x + (6 * p); sx < x + w - (35 * p); sx += (winW + gap)) {
                ctx.fillRect(sx, y + (7 * p), winW, winH);
            }
        }

        // Clean high-res floating "X" crossbuck (No stem)
        function drawPixelCrossbuck(x, y, size) {
            let p = size / 24; 
            
            ctx.save();
            ctx.translate(x + size/2, y + size/2);
            
            // High-resolution yellow framing blocks
            ctx.fillStyle = "#f1c40f";
            for (let i = -8; i <= 8; i++) {
                ctx.fillRect((i * p) - p, (i * p) - p, 3 * p, 3 * p);
                ctx.fillRect((i * p) - p, (-i * p) - p, 3 * p, 3 * p);
            }

            // High-resolution black inner graphic lining
            ctx.fillStyle = "#111111";
            for (let i = -8; i <= 8; i++) {
                ctx.fillRect(i * p, i * p, p, p);
                ctx.fillRect(i * p, -i * p, p, p);
            }
            
            ctx.restore();
        }

        btnUp.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!gameActive) return;
            if (player.currentTrack > 0) {
                player.currentTrack--;
                player.y = trackPositions[player.currentTrack] - (player.height / 2);
            }
        }, { passive: false });

        btnDown.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!gameActive) return;
            if (player.currentTrack < 3) {
                player.currentTrack++;
                player.y = trackPositions[player.currentTrack] - (player.height / 2);
            }
        }, { passive: false });

        btnStart.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startScreen.classList.add('hidden');
            resetGame();
        }, { passive: false });

        btnRestart.addEventListener('touchstart', (e) => {
            e.preventDefault();
            gameOverScreen.classList.add('hidden');
            resetGame();
        }, { passive: false });

        function resetGame() {
            score = 0;
            currentLevel = 1;
            obstacles = [];
            bushes = [];
            gameSpeed = baseSpeed;
            spawnTimer = 0;
            levelUpFlashTimer = 0;
            player.currentTrack = 1;
            scoreVal.textContent = score;
            levelVal.textContent = currentLevel;
            calculateLayout();
            gameActive = true;
            animate();
        }

        function animate() {
            if (!gameActive) return;

            // Environmental layouts canvas renders
            ctx.fillStyle = "#2ecc71"; 
            ctx.fillRect(0, 0, canvas.width, grassTopHeight);
            ctx.fillRect(0, canvas.height - grassBottomHeight, canvas.width, grassBottomHeight);
            
            ctx.fillStyle = "#bdc3c7"; 
            ctx.fillRect(0, grassTopHeight, canvas.width, trackZoneHeight);

            ctx.fillStyle = "#7f8c8d";
            for(let i = 0; i < 4; i++) {
                ctx.fillRect(0, trackPositions[i] - 2, canvas.width, 4);
            }

            // Decorative rolling background bushes
            if (Math.random() < 0.02) {
                let isTop = Math.random() > 0.5;
                bushes.push({
                    x: canvas.width,
                    y: isTop ? Math.random() * (grassTopHeight - 30) : canvas.height - grassBottomHeight + 10 + Math.random() * (grassBottomHeight - 40),
                    size: Math.random() * (35 - 20) + 20
                });
            }
            
            ctx.fillStyle = "#27ae60"; 
            for(let b = bushes.length - 1; b >= 0; b--) {
                bushes[b].x -= gameSpeed;
                ctx.fillRect(bushes[b].x, bushes[b].y, bushes[b].size, bushes[b].size * 0.8);
                if (bushes[b].x + bushes[b].size < 0) bushes.splice(b, 1);
            }

            // Draw high resolution train model
            drawPixelTrain(player.x, player.y, player.width, player.height, TRAIN_DATABASE[selectedTrainIndex]);

            // Track obstacle timers
            spawnTimer++;
            if (spawnTimer >= spawnInterval) {
                let randomTrack = Math.floor(Math.random() * 4);
                let size = Math.floor(trackSpacing * 0.45); 
                obstacles.push({
                    x: canvas.width,
                    y: trackPositions[randomTrack] - (size / 2),
                    size: size,
                    track: randomTrack
                });
                spawnTimer = 0;
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.x -= gameSpeed;

                // Draw high resolution cross icon
                drawPixelCrossbuck(obs.x, obs.y, obs.size);

                // Precise Hitbox Calculations
                if (
                    player.currentTrack === obs.track &&
                    player.x + player.width > obs.x &&
                    player.x < obs.x + obs.size
                ) {
                    gameActive = false;
                    finalScore.textContent = score;
                    finalLevel.textContent = currentLevel;
                    gameOverScreen.classList.remove('hidden');
                    return;
                }

                if (obs.x + obs.size < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreVal.textContent = score;

                    // Progress check: Level Up calculation every 20 avoids
                    if (score > 0 && score % 20 === 0) {
                        currentLevel++;
                        levelVal.textContent = currentLevel;
                        gameSpeed = gameSpeed * 1.07; // Scaled exactly 7% faster
                        levelUpFlashTimer = 90; // Pop message on screen for 90 frame updates
                    }
                }
            }

            // Draw "LEVEL UP!" toast indicator text
            if (levelUpFlashTimer > 0) {
                levelUpFlashTimer--;
                ctx.fillStyle = "#f1c40f";
                ctx.font = "bold 40px sans-serif";
                ctx.textAlign = "center";
                ctx.shadowColor = "#000";
                ctx.shadowBlur = 4;
                ctx.fillText("LEVEL UP! SPEED +7%", canvas.width / 2, canvas.height / 2);
                ctx.shadowBlur = 0; // Reset canvas states
                ctx.textAlign = "left";
            }

            requestAnimationFrame(animate);
        }

        window.addEventListener('load', () => {
            resizeCanvas();
        });
        resizeCanvas();
    </script>
</body>
</html>
