<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shinkansen Crossing v3.00 - Tencent Mobile Edition</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            position: fixed;
        }

        #game-container { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; }

        /* Mobile-First Minimalist HUD */
        #hud {
            position: absolute; top: 15px; left: 15px; right: 15px;
            display: flex; justify-content: space-between;
            color: #ffffff; font-size: 18px; font-weight: bold;
            text-shadow: 2px 2px 0px #000; z-index: 5; pointer-events: none;
        }
        .coin-count { color: #f1c40f; }

        /* Full Screen Overlay Menus */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 15, 26, 0.95);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; color: white; z-index: 10; text-align: center;
            padding: 20px; box-sizing: border-box;
        }

        .screen h1 {
            font-size: 42px; margin: 0; color: #ffaa00;
            text-shadow: 3px 3px 0px #000; letter-spacing: 1px;
        }

        /* Gacha Capsule Style UI */
        .gacha-panel {
            background: rgba(255,255,255,0.05); border: 2px dashed #555;
            padding: 15px; border-radius: 12px; margin: 15px 0; width: 90%; max-width: 340px;
        }
        .current-train-display {
            font-size: 20px; color: #00e676; font-weight: bold; margin-bottom: 8px;
        }

        .btn-group { display: flex; gap: 10px; width: 100%; max-width: 340px; }

        .menu-btn {
            flex: 1; padding: 14px; font-size: 18px; font-weight: bold;
            border-radius: 8px; border: 3px solid #fff; cursor: pointer;
            box-shadow: 0 5px 0px #000; text-transform: uppercase;
        }
        .btn-play { background-color: #00e676; color: #000; border-color: #fff; }
        .btn-gacha { background-color: #9c27b0; color: #fff; }
        .btn-ad { background-color: #2196f3; color: #fff; font-size: 15px; }

        /* Garage Console UI */
        .garage-panel {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 12px; margin: 10px 0; width: 90%; max-width: 340px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .garage-title {
            font-size: 13px; color: #ffaa00; font-weight: bold; margin-bottom: 10px;
            text-transform: uppercase; letter-spacing: 1px; text-shadow: 1px 1px 0px #000;
        }
        .garage-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
        }
        .garage-card {
            background: rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.1);
            border-radius: 8px; padding: 8px; display: flex; flex-direction: column;
            align-items: center; justify-content: space-between; position: relative;
            transition: all 0.2s ease;
        }
        .garage-card.unlocked { border-color: rgba(0, 230, 118, 0.2); }
        .garage-card.equipped { border-color: #ffaa00; background: rgba(241, 196, 15, 0.05); }
        .garage-card:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        .garage-card-name { font-size: 11px; font-weight: bold; color: #fff; text-align: center; margin-bottom: 2px; }
        .garage-card-rarity { font-size: 8px; font-weight: bold; text-transform: uppercase; padding: 2px 4px; border-radius: 3px; margin-bottom: 6px; }
        .rarity-common { background: #555; color: #fff; }
        .rarity-rare { background: #2196f3; color: #fff; }
        .rarity-ssr { background: #9c27b0; color: #fff; box-shadow: 0 0 5px rgba(156,39,176,0.6); }

        .garage-card-swatch {
            width: 100%; height: 16px; border-radius: 3px; display: flex; overflow: hidden; margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .swatch-segment { flex: 1; height: 100%; }

        .garage-btn {
            width: 100%; padding: 6px 0; font-size: 10px; font-weight: bold; border-radius: 4px; border: 2px solid #fff;
            cursor: pointer; text-transform: uppercase; box-shadow: 0 2px 0px #000; transition: all 0.1s ease;
        }
        .garage-btn:active { transform: translateY(1px); box-shadow: 0 1px 0px #000; }
        .btn-active { background-color: #00e676; color: #000; border-color: #fff; pointer-events: none; }
        .btn-equip { background-color: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.4); }
        .btn-buy { background-color: #f1c40f; color: #000; border-color: #fff; }

        .menu-btn:active { transform: translateY(3px); box-shadow: 0 2px 0px #000; }

        /* Simulated Social Leaderboard Panel */
        .leaderboard {
            width: 90%; max-width: 340px; background: rgba(0,0,0,0.4);
            border-radius: 10px; padding: 10px; margin-top: 15px; font-size: 14px;
        }
        .leaderboard-title { color: #aaa; font-weight: bold; margin-bottom: 5px; text-align: left;}
        .leaderboard-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .rank-me { color: #ffaa00; font-weight: bold; background: rgba(241, 196, 15, 0.1); }

        /* Invisible Touch Splitting Overlay Hints for One-Handed Control */
        #touch-zones {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; z-index: 4; pointer-events: auto;
        }
        .zone {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 40px;
            pointer-events: auto;
        }
        .zone-up { background: linear-gradient(to right, rgba(255,255,255,0.05), transparent); }
        .zone-down { background: linear-gradient(to left, rgba(255,255,255,0.05), transparent); }

        .control-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: rgba(255, 255, 255, 0.85);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3), inset 0 0 10px rgba(255, 255, 255, 0.1);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            -webkit-user-select: none;
        }

        @media (hover: hover) {
            .zone:hover .control-btn {
                background: rgba(255, 255, 255, 0.25);
                border-color: rgba(255, 255, 255, 0.6);
                box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
            }
        }

        .zone:active .control-btn {
            background: rgba(0, 230, 118, 0.4);
            border-color: #00e676;
            color: #ffffff;
            transform: scale(0.9);
            box-shadow: 0 0 15px rgba(0, 230, 118, 0.6);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud">
            <div>🏆 <span id="score-val">0</span></div>
            <div>Lv.<span id="level-val">1</span></div>
            <div class="coin-count">🪙 <span id="coin-val">0</span></div>
        </div>

        <!-- Touch Zones for input handling -->
        <div id="touch-zones" class="hidden">
            <div id="zone-left" class="zone zone-up">
                <div class="control-btn">▲</div>
            </div>
            <div id="zone-right" class="zone zone-down">
                <div class="control-btn">▼</div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <!-- Tencent Style Main Menu Dashboard -->
        <div id="start-screen" class="screen">
            <h1>SHINKANSEN RUN</h1>
            <p style="color: #888; margin: 2px 0 10px 0;">Hyper-Casual Mobile Edition v3.0</p>
            
            <div class="gacha-panel" style="margin: 5px 0;">
                <div style="font-size: 12px; color: #aaa;">ACTIVE PILOT:</div>
                <div id="active-train-name" class="current-train-display">E5 Hayabusa (Common)</div>
                <button id="btn-draw" class="menu-btn btn-gacha" style="font-size:14px; padding:8px;">🎰 Capsule Gacha (Cost: 10 🪙)</button>
            </div>

            <div class="garage-panel">
                <div class="garage-title">🔧 SHINKANSEN GARAGE</div>
                <div id="garage-list" class="garage-grid">
                    <!-- Dynamic train cards injected here -->
                </div>
            </div>

            <div class="btn-group" style="margin-top: 5px;">
                <button id="btn-start" class="menu-btn btn-play">RUN</button>
            </div>

            <!-- Social Leaderboard Injection -->
            <div class="leaderboard">
                <div class="leaderboard-title">WeChat Friends Rankings:</div>
                <div class="leaderboard-row"><span>1. King_of_Trains</span><span>Score: 142</span></div>
                <div class="leaderboard-row"><span>2. SpeedRacer99</span><span>Score: 85</span></div>
                <div class="leaderboard-row rank-me"><span>3. You (Active)</span><span>Best: <span id="pb-val">0</span></span></div>
            </div>
        </div>

        <!-- Game Over Menu Matrix with Revive Option -->
        <div id="game-over-screen" class="screen hidden">
            <h1 style="color:#ff4757;">CRASHED!</h1>
            <p style="font-size: 20px; margin: 10px 0;">Crossings Cleared: <b id="final-score" style="color:#ffaa00;">0</b></p>
            
            <div class="gacha-panel" id="revive-box">
                <p style="margin:0 0 10px 0; font-size:14px;">Save your high score streaking loop?</p>
                <button id="btn-revive" class="menu-btn btn-ad">📺 Watch Video Ad to Revive</button>
            </div>

            <div class="btn-group">
                <button id="btn-restart" class="menu-btn btn-play" style="background-color:#2196f3; color:white;">BACK TO YARD</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const scoreVal = document.getElementById('score-val');
        const levelVal = document.getElementById('level-val');
        const coinVal = document.getElementById('coin-val');
        const pbVal = document.getElementById('pb-val');
        const finalScore = document.getElementById('final-score');
        const activeTrainName = document.getElementById('active-train-name');
        const garageList = document.getElementById('garage-list');
        
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const touchZones = document.getElementById('touch-zones');
        const reviveBox = document.getElementById('revive-box');

        const btnStart = document.getElementById('btn-start');
        const btnRestart = document.getElementById('btn-restart');
        const btnDraw = document.getElementById('btn-draw');
        const btnRevive = document.getElementById('btn-revive');
        const zoneLeft = document.getElementById('zone-left');
        const zoneRight = document.getElementById('zone-right');

        let grassTopHeight, grassBottomHeight, trackZoneHeight, trackSpacing;
        let trackPositions = [];

        // Parallax environment arrays
        let stars = [];
        let parallaxBuildings = [];
        let parallaxTrees = [];
        let grassTufts = [];

        // Tencent Mobile Economy State
        let totalCoins = parseInt(localStorage.getItem('t_mobile_coins')) || 0;
        let personalBest = parseInt(localStorage.getItem('t_mobile_pb')) || 0;
        let unlockedIds = JSON.parse(localStorage.getItem('t_mobile_fleet')) || ["E5"];
        let activeTrainIdx = parseInt(localStorage.getItem('t_mobile_active_idx')) || 0;
        let hasRevivedThisRun = false;

        const GACHA_POOL = [
            { id: "E5", name: "E5 Hayabusa", rarity: "Common", primary: "%2300a896", stripe: "%23ff007f", base: "%23e5e5e5", price: 0 },
            { id: "E6", name: "E6 Komachi", rarity: "Rare", primary: "%23c21807", stripe: "%23111111", base: "%23e5e5e5", price: 50 },
            { id: "DY", name: "Doctor Yellow", rarity: "SSR 🔥", primary: "%23f1c40f", stripe: "%232980b9", base: "%2334495e", price: 150 }
        ];

        const trainImages = {};
        const crossbuckImg = new Image();
        crossbuckImg.src = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M 15,5 L 50,40 L 85,5 L 95,15 L 60,50 L 95,85 L 85,95 L 50,60 L 15,95 L 5,85 L 40,50 L 5,15 Z" fill="%23f1c40f"/><path d="M 18,10 L 50,42 L 82,10 L 90,18 L 58,50 L 90,82 L 82,90 L 50,58 L 18,90 L 10,82 L 42,50 L 10,18 Z" fill="%23111111"/></svg>`;

        function buildTrainSVGs() {
            GACHA_POOL.forEach(t => {
                const img = new Image();
                img.src = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80">
                    <path d="M 0,10 L 150,10 Q 210,12 230,30 L 265,50 Q 280,56 280,63 L 280,65 L 0,65 Z" fill="${t.primary}"/>
                    <path d="M 215,36 Q 230,34 242,42 L 235,46 Z" fill="%231a252f"/>
                    <rect x="0" y="61" width="280" height="4" fill="${t.stripe}"/>
                    <path d="M 0,65 L 275,65 Q 278,72 270,74 L 0,74 Z" fill="${t.base}"/>
                </svg>`;
                trainImages[t.id] = img;
            });
        }
        buildTrainSVGs();

        function renderGarage() {
            garageList.innerHTML = "";
            GACHA_POOL.forEach((t, idx) => {
                const isUnlocked = unlockedIds.includes(t.id);
                const isActive = activeTrainIdx === idx;
                
                const card = document.createElement('div');
                card.className = `garage-card${isUnlocked ? ' unlocked' : ''}${isActive ? ' equipped' : ''}`;
                
                // Color Swatches decoding
                const primaryColor = t.primary.replace("%23", "#");
                const stripeColor = t.stripe.replace("%23", "#");
                const baseColor = t.base.replace("%23", "#");
                
                const rarityClass = t.rarity.includes("SSR") ? 'rarity-ssr' : (t.rarity.includes("Rare") ? 'rarity-rare' : 'rarity-common');
                
                card.innerHTML = `
                    <div class="garage-card-name">${t.name.split(" ")[1] || t.name}</div>
                    <div class="garage-card-rarity ${rarityClass}">${t.rarity.replace(" 🔥", "")}</div>
                    <div class="garage-card-swatch">
                        <div class="swatch-segment" style="background: ${primaryColor};"></div>
                        <div class="swatch-segment" style="background: ${stripeColor}; flex: 0.15;"></div>
                        <div class="swatch-segment" style="background: ${baseColor};"></div>
                    </div>
                `;
                
                const btn = document.createElement('button');
                btn.className = "garage-btn";
                
                if (isActive) {
                    btn.textContent = "Active";
                    btn.classList.add("btn-active");
                } else if (isUnlocked) {
                    btn.textContent = "Equip";
                    btn.classList.add("btn-equip");
                    btn.addEventListener('click', () => {
                        activeTrainIdx = idx;
                        localStorage.setItem('t_mobile_active_idx', activeTrainIdx);
                        syncUI();
                    });
                } else {
                    btn.textContent = `Buy ${t.price}🪙`;
                    btn.classList.add("btn-buy");
                    btn.addEventListener('click', () => {
                        if (totalCoins >= t.price) {
                            totalCoins -= t.price;
                            localStorage.setItem('t_mobile_coins', totalCoins);
                            unlockedIds.push(t.id);
                            localStorage.setItem('t_mobile_fleet', JSON.stringify(unlockedIds));
                            activeTrainIdx = idx;
                            localStorage.setItem('t_mobile_active_idx', activeTrainIdx);
                            syncUI();
                            alert(`🎉 Purchased & equipped ${t.name}!`);
                        } else {
                            alert(`Not enough 🪙! You need ${t.price} 🪙, but only have ${totalCoins} 🪙.`);
                        }
                    });
                }
                
                card.appendChild(btn);
                garageList.appendChild(card);
            });
        }

        function syncUI() {
            coinVal.textContent = totalCoins;
            pbVal.textContent = personalBest;
            const active = GACHA_POOL[activeTrainIdx] || GACHA_POOL[0];
            activeTrainName.textContent = `${active.name} (${active.rarity})`;
            renderGarage();
        }

        // Capsule Box Pull Event System
        btnDraw.addEventListener('click', () => {
            if (totalCoins >= 10) {
                totalCoins -= 10;
                // Randomized Luck Gacha Roll Matrix
                const rand = Math.random();
                let rolledIdx = 0; 
                if (rand > 0.85) rolledIdx = 2;       // 15% SSR Chance
                else if (rand > 0.50) rolledIdx = 1;  // 35% Rare Chance

                const rolledTrain = GACHA_POOL[rolledIdx];
                if (!unlockedIds.includes(rolledTrain.id)) {
                    unlockedIds.push(rolledTrain.id);
                    localStorage.setItem('t_mobile_fleet', JSON.stringify(unlockedIds));
                }
                activeTrainIdx = rolledIdx; // Auto equip roll
                localStorage.setItem('t_mobile_active_idx', activeTrainIdx);
                localStorage.setItem('t_mobile_coins', totalCoins);
                syncUI();
                alert(`🎰 GACHA CAPSULE OPENED:\nYou won the ${rolledTrain.name} [${rolledTrain.rarity}]!`);
            } else {
                alert("Not enough 🪙! Run more tracks to collect currency.");
            }
        });

        function initEnvironment() {
            const skyHeight = grassTopHeight * 0.65;
            
            // 1. Stars
            stars = [];
            for (let i = 0; i < 30; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * skyHeight,
                    size: Math.random() * 1.5 + 0.5,
                    alpha: Math.random(),
                    twinkleSpeed: Math.random() * 0.02 + 0.005
                });
            }
            
            // 2. Parallax Buildings (Skyline)
            parallaxBuildings = [];
            let currentX = 0;
            const targetWidth = canvas.width * 2.5;
            while (currentX < targetWidth) {
                const w = Math.random() * 60 + 50;
                const h = Math.random() * (skyHeight * 0.5) + (skyHeight * 0.35);
                const buildingColor = ["#1a1a2e", "#222035", "#292742"][Math.floor(Math.random() * 3)];
                
                const cols = Math.floor(w / 14);
                const rows = Math.floor(h / 18);
                const windows = [];
                for (let r = 0; r < rows - 1; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (Math.random() > 0.4) {
                            windows.push({ r, c });
                        }
                    }
                }
                
                parallaxBuildings.push({
                    x: currentX,
                    width: w,
                    height: h,
                    color: buildingColor,
                    windows: windows,
                    cols: cols,
                    rows: rows
                });
                currentX += w + Math.random() * 15;
            }

            // 3. Parallax Trees
            parallaxTrees = [];
            let treeX = 0;
            while (treeX < canvas.width * 2) {
                const size = Math.random() * 15 + 18;
                const isTop = Math.random() > 0.5;
                const type = Math.random() > 0.5 ? 'pine' : 'sakura';
                const leafColor = type === 'pine' ? '#10ac84' : '#ff007f';
                
                parallaxTrees.push({
                    x: treeX,
                    isTop: isTop,
                    size: size,
                    type: type,
                    color: leafColor
                });
                treeX += Math.random() * 80 + 40;
            }

            // 4. Grass Tufts
            grassTufts = [];
            for (let i = 0; i < 40; i++) {
                const isTop = Math.random() > 0.5;
                const tuftY = isTop 
                    ? Math.random() * (grassTopHeight * 0.3) + (grassTopHeight * 0.7)
                    : Math.random() * (grassBottomHeight * 0.9) + (canvas.height - grassBottomHeight * 0.95);
                grassTufts.push({
                    x: Math.random() * canvas.width,
                    y: tuftY,
                    length: Math.random() * 8 + 5
                });
            }
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            grassTopHeight = canvas.height * 0.25;
            grassBottomHeight = canvas.height * 0.25;
            trackZoneHeight = canvas.height - grassTopHeight - grassBottomHeight;
            trackSpacing = trackZoneHeight / 4;

            trackPositions = [
                grassTopHeight + (trackSpacing * 0.5),
                grassTopHeight + (trackSpacing * 1.5),
                grassTopHeight + (trackSpacing * 2.5),
                grassTopHeight + (trackSpacing * 3.5)
            ];

            if(player) {
                player.x = 40; // Pulled closer to edge for mobile readability
                player.height = Math.floor(trackSpacing * 0.45); 
                player.width = player.height * 3.2; 
                player.y = trackPositions[player.currentTrack] - (player.height / 2);
            }
            initEnvironment();
        }
        window.addEventListener('resize', resizeCanvas);

        // Core Game Loops Variables
        let gameActive = false; let isCrashing = false;
        let score = 0; let currentLevel = 1;
        let obstacles = []; let juiceParticles = [];
        let spawnTimer = 0; let baseSpeed = 3.5; let gameSpeed = baseSpeed;
        let spawnInterval = 110; let levelUpFlashTimer = 0;
        let animationFrameId = null;

        const player = { currentTrack: 1, x: 40, y: 0, width: 90, height: 25 };

        function movePlayerTrack(direction) {
            let target = player.currentTrack + direction;
            if (target >= 0 && target <= 3 && !isCrashing) {
                player.currentTrack = target;
                player.y = trackPositions[player.currentTrack] - (player.height / 2);
            }
        }

        // Mobile Split-Screen Tap Inputs Hook Mapping
        zoneLeft.addEventListener('touchstart', (e) => { e.preventDefault(); movePlayerTrack(-1); });
        zoneRight.addEventListener('touchstart', (e) => { e.preventDefault(); movePlayerTrack(1); });
        // Mouse Fallbacks for testing
        zoneLeft.addEventListener('mousedown', () => movePlayerTrack(-1));
        zoneRight.addEventListener('mousedown', () => movePlayerTrack(1));

        btnStart.addEventListener('click', () => {
            startScreen.classList.add('hidden');
            touchZones.classList.remove('hidden');
            hasRevivedThisRun = false;
            resetGame();
        });

        btnRestart.addEventListener('click', () => {
            gameOverScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
            touchZones.classList.add('hidden');
            syncUI();
        });

        // Monetized Revive Lifeline Mechanics
        btnRevive.addEventListener('click', () => {
            alert("📺 Loading Ad Capsule... Complete! Obstacle cleared!");
            obstacles = []; // Wipe current items
            isCrashing = false;
            gameActive = true;
            hasRevivedThisRun = true;
            gameOverScreen.classList.add('hidden');
            touchZones.classList.remove('hidden');
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            animate();
        });

        function resetGame() {
            score = 0; currentLevel = 1; isCrashing = false;
            obstacles = []; juiceParticles = [];
            gameSpeed = baseSpeed; spawnTimer = 0; levelUpFlashTimer = 0;
            player.currentTrack = 1;
            scoreVal.textContent = score; levelVal.textContent = currentLevel;
            resizeCanvas();
            gameActive = true;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            animate();
        }

        function animate() {
            if (!gameActive && !isCrashing) {
                animationFrameId = null;
                return;
            }

            let speedFactor = isCrashing ? 0 : gameSpeed;

            // 1. Draw Midnight Sky
            const skyHeight = grassTopHeight * 0.65;
            ctx.fillStyle = "#0c0d14";
            ctx.fillRect(0, 0, canvas.width, skyHeight);

            // 2. Draw Twinkling Stars
            stars.forEach(s => {
                s.alpha += Math.sin(Date.now() * 0.005 + s.x) * s.twinkleSpeed;
                s.alpha = Math.max(0.1, Math.min(1, s.alpha));
                ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                ctx.fillRect(s.x, s.y, s.size, s.size);
            });

            // 3. Draw Parallax Buildings (Skyline)
            parallaxBuildings.forEach(b => {
                if (!isCrashing) b.x -= speedFactor * 0.15;
                if (b.x + b.width < 0) {
                    let maxX = 0;
                    parallaxBuildings.forEach(other => { maxX = Math.max(maxX, other.x); });
                    b.x = maxX + b.width + Math.random() * 15;
                }
                const buildY = skyHeight - b.height;
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x, buildY, b.width, b.height);
                
                ctx.fillStyle = "rgba(241, 196, 15, 0.75)";
                b.windows.forEach(w => {
                    const winX = b.x + 8 + w.c * 12;
                    const winY = buildY + 10 + w.r * 15;
                    if (winX + 6 < b.x + b.width) {
                        ctx.fillRect(winX, winY, 5, 8);
                    }
                });
            });

            // 4. Draw Grass Fields (Top & Bottom)
            ctx.fillStyle = "#12241d";
            ctx.fillRect(0, skyHeight, canvas.width, grassTopHeight - skyHeight); // Top grass field
            ctx.fillRect(0, canvas.height - grassBottomHeight, canvas.width, grassBottomHeight); // Bottom grass field

            // 5. Draw Grass Tufts
            ctx.strokeStyle = "rgba(0, 230, 118, 0.15)";
            ctx.lineWidth = 1.5;
            grassTufts.forEach(g => {
                if (!isCrashing) g.x -= speedFactor;
                if (g.x < 0) {
                    g.x = canvas.width + Math.random() * 50;
                }
                ctx.beginPath();
                ctx.moveTo(g.x, g.y);
                ctx.lineTo(g.x - 3, g.y - g.length);
                ctx.moveTo(g.x, g.y);
                ctx.lineTo(g.x + 3, g.y - g.length + 2);
                ctx.stroke();
            });

            // 6. Draw Trackside Parallax Trees
            parallaxTrees.forEach(t => {
                if (!isCrashing) t.x -= speedFactor * 0.45;
                if (t.x + 40 < 0) {
                    let maxX = 0;
                    parallaxTrees.forEach(other => { maxX = Math.max(maxX, other.x); });
                    t.x = maxX + Math.random() * 80 + 40;
                }
                const baseLineY = t.isTop ? grassTopHeight : canvas.height - grassBottomHeight;
                const trunkX = t.x + 10;
                ctx.fillStyle = "#5d4037";
                if (t.isTop) {
                    ctx.fillRect(trunkX - 2, baseLineY - 12, 4, 12);
                    ctx.fillStyle = t.color;
                    if (t.type === 'pine') {
                        ctx.beginPath();
                        ctx.moveTo(trunkX, baseLineY - t.size - 5);
                        ctx.lineTo(trunkX - 10, baseLineY - 10);
                        ctx.lineTo(trunkX + 10, baseLineY - 10);
                        ctx.closePath();
                        ctx.fill();
                    } else {
                        ctx.beginPath();
                        ctx.arc(trunkX, baseLineY - 18, 9, 0, Math.PI * 2);
                        ctx.arc(trunkX - 6, baseLineY - 14, 7, 0, Math.PI * 2);
                        ctx.arc(trunkX + 6, baseLineY - 14, 7, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else {
                    ctx.fillRect(trunkX - 2, baseLineY, 4, 12);
                    ctx.fillStyle = t.color;
                    if (t.type === 'pine') {
                        ctx.beginPath();
                        ctx.moveTo(trunkX, baseLineY + 5);
                        ctx.lineTo(trunkX - 10, baseLineY + t.size + 5);
                        ctx.lineTo(trunkX + 10, baseLineY + t.size + 5);
                        ctx.closePath();
                        ctx.fill();
                    } else {
                        ctx.beginPath();
                        ctx.arc(trunkX, baseLineY + 12, 9, 0, Math.PI * 2);
                        ctx.arc(trunkX - 6, baseLineY + 10, 7, 0, Math.PI * 2);
                        ctx.arc(trunkX + 6, baseLineY + 10, 7, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            });

            // 7. Draw Asphalt Track Road
            ctx.fillStyle = "#23272a";
            ctx.fillRect(0, grassTopHeight, canvas.width, trackZoneHeight);
            
            // 8. Draw Track Divider Lines
            ctx.fillStyle = "#718093";
            for(let i = 0; i < 4; i++) ctx.fillRect(0, trackPositions[i] - 1, canvas.width, 2);

            // Ambient Speed Wind Trails
            if (Math.random() < 0.2 && !isCrashing) {
                juiceParticles.push({ x: canvas.width, y: Math.random()*canvas.height, vx: -speedFactor*2, vy: 0, size: Math.random()*20+10, color: "rgba(255,255,255,0.1)" });
            }
            for(let p = juiceParticles.length-1; p >= 0; p--) {
                juiceParticles[p].x += juiceParticles[p].vx;
                ctx.fillStyle = juiceParticles[p].color;
                ctx.fillRect(juiceParticles[p].x, juiceParticles[p].y, juiceParticles[p].size, 1);
                if(juiceParticles[p].x < 0) juiceParticles.splice(p, 1);
            }

            // Draw Equipped Gacha Shinkansen
            const currentTrainID = GACHA_POOL[activeTrainIdx].id;
            ctx.drawImage(trainImages[currentTrainID], player.x, player.y, player.width, player.height);

            // Obstacle Process Engine Matrix
            if (!isCrashing) spawnTimer++;
            if (spawnTimer >= spawnInterval) {
                let track = Math.floor(Math.random() * 4);
                let size = Math.floor(trackSpacing * 0.85);
                obstacles.push({ x: canvas.width, y: trackPositions[track] - (size/2), size: size, track: track });
                spawnTimer = 0;
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= speedFactor;
                ctx.drawImage(crossbuckImg, obstacles[i].x, obstacles[i].y, obstacles[i].size, obstacles[i].size);

                let padding = obstacles[i].size * 0.15;
                if (
                    !isCrashing &&
                    player.currentTrack === obstacles[i].track &&
                    player.x + player.width > obstacles[i].x + padding &&
                    player.x < obstacles[i].x + obstacles[i].size - padding
                ) {
                    isCrashing = true;
                    
                    setTimeout(() => {
                        gameActive = false;
                        isCrashing = false;
                        touchZones.classList.add('hidden');
                        
                        // Check if personal best broken
                        if (score > personalBest) {
                            personalBest = score;
                            localStorage.setItem('t_mobile_pb', personalBest);
                        }

                        // Add coins directly to wallet
                        totalCoins += score;
                        localStorage.setItem('t_mobile_coins', totalCoins);
                        
                        finalScore.textContent = score;
                        
                        // Hide revive button option if already spent during this layout run
                        if (hasRevivedThisRun) reviveBox.classList.add('hidden');
                        else reviveBox.classList.remove('hidden');

                        gameOverScreen.classList.remove('hidden');
                    }, 800);
                }

                if (obstacles[i].x + obstacles[i].size < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreVal.textContent = score;

                    if (score > 0 && score % 15 === 0) {
                        currentLevel++;
                        levelVal.textContent = currentLevel;
                        gameSpeed *= 1.08;
                        levelUpFlashTimer = 60;
                    }
                }
            }

            if (levelUpFlashTimer > 0) {
                levelUpFlashTimer--;
                ctx.fillStyle = "#ffaa00"; ctx.font = "bold 40px sans-serif"; ctx.textAlign = "center";
                ctx.fillText("⚡ SPEED UP ⚡", canvas.width / 2, canvas.height / 2); ctx.textAlign = "left";
            }

            animationFrameId = requestAnimationFrame(animate);
        }

        window.addEventListener('load', () => {
            resizeCanvas();
            syncUI();
        });
    </script>
</body>
</html>
