<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shinkansen Crossing v1.4</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            position: fixed;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: corner-detecting;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffffff;
            font-size: 26px;
            font-weight: bold;
            text-shadow: 3px 3px 0px #000;
            z-index: 5;
            pointer-events: none;
            line-height: 1.4;
        }

        #controls-container {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 130px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 5;
        }

        .btn {
            width: 130px;
            height: 110px;
            background-color: rgba(0, 0, 0, 0.6);
            border: 4px solid #fff;
            border-radius: 15px;
            color: white;
            font-size: 32px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 0px #000;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0px #000;
            background-color: rgba(255, 255, 255, 0.3);
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
            text-align: center;
        }

        .screen h1 {
            font-size: 54px;
            margin-bottom: 5px;
            color: #00d2d3;
            text-shadow: 4px 4px 0px #000;
            letter-spacing: 2px;
        }

        .version-tag {
            font-size: 20px;
            color: #ff4757;
            font-weight: bold;
            margin-top: -5px;
            margin-bottom: 15px;
            text-shadow: 2px 2px 0px #000;
        }

        .screen p {
            font-size: 22px;
            margin-bottom: 30px;
            color: #ccc;
        }

        .menu-btn {
            padding: 20px 50px;
            font-size: 28px;
            font-weight: bold;
            background-color: #ff4757;
            color: white;
            border: 4px solid #fff;
            box-shadow: 0 8px 0px #000;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .menu-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0px #000;
        }

        /* Fullscreen Landscape Enforcement Notification Overlay */
        #orientation-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #111;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        #orientation-screen .icon {
            font-size: 70px;
            margin-bottom: 20px;
            animation: rotateDevice 2s infinite ease-in-out;
        }

        @keyframes rotateDevice {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="orientation-screen" class="hidden">
            <div class="icon">📱🔄</div>
            <h2>PLEASE ROTATE DEVICE</h2>
            <p>Play in Landscape Mode for the best Train View!</p>
        </div>

        <div id="hud">
            <div>LEVEL: <span id="level-val">1</span></div>
            <div>CROSSINGS AVOIDED: <span id="score-val">0</span></div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="controls-container">
            <div id="btn-up" class="btn">▲</div>
            <div id="btn-down" class="btn">▼</div>
        </div>

        <div id="start-screen" class="screen">
            <h1>SHINKANSEN CROSSING</h1>
            <div class="version-tag">v1.4</div>
            <p>Avoid the Japanese Railway Crossbucks!</p>
            <button id="btn-start" class="menu-btn">START GAME</button>
        </div>

        <div id="game-over-screen" class="screen hidden">
            <h1>GAME OVER</h1>
            <p>Crossings Avoided: <span id="final-score">0</span></p>
            <p style="font-size: 18px; color: #ff4757;">Reached Level <span id="final-level">1</span></p>
            <button id="btn-restart" class="menu-btn" style="background-color: #2ed573;">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;

        const scoreVal = document.getElementById('score-val');
        const levelVal = document.getElementById('level-val');
        const finalScore = document.getElementById('final-score');
        const finalLevel = document.getElementById('final-level');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const orientationScreen = document.getElementById('orientation-screen');
        
        const btnUp = document.getElementById('btn-up');
        const btnDown = document.getElementById('btn-down');
        const btnStart = document.getElementById('btn-start');
        const btnRestart = document.getElementById('btn-restart');

        let grassTopHeight, grassBottomHeight, trackZoneHeight, trackSpacing;
        let trackPositions = [];

        // Check device orientation dynamically
        function checkOrientation() {
            if (window.innerHeight > window.innerWidth) {
                orientationScreen.classList.remove('hidden');
            } else {
                orientationScreen.classList.add('hidden');
            }
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            checkOrientation();
            calculateLayout();
        }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', resizeCanvas);

        function calculateLayout() {
            grassTopHeight = canvas.height * 0.25;
            grassBottomHeight = canvas.height * 0.25;
            trackZoneHeight = canvas.height - grassTopHeight - grassBottomHeight;
            trackSpacing = trackZoneHeight / 4;

            trackPositions = [
                grassTopHeight + (trackSpacing * 0.5),
                grassTopHeight + (trackSpacing * 1.5),
                grassTopHeight + (trackSpacing * 2.5),
                grassTopHeight + (trackSpacing * 3.5)
            ];

            if(player) {
                player.x = 80;
                player.height = Math.floor(trackSpacing * 0.55);
                player.width = player.height * 2.8; 
                player.y = trackPositions[player.currentTrack] - (player.height / 2);
            }
        }

        const TRAIN_DATABASE = [
            {
                id: "E5",
                name: "E5 Series Hayabusa",
                primaryColor: "#00a896", 
                stripeColor: "#ff007f",  
                baseColor: "#e5e5e5"    
            }
        ];
        
        let selectedTrainIndex = 0;
        let gameActive = false;
        let score = 0;
        let currentLevel = 1;
        let obstacles = [];
        let bushes = [];
        let spawnTimer = 0;
        
        let baseSpeed = 3.2;      
        let gameSpeed = baseSpeed;
        let spawnInterval = 120;  
        let levelUpFlashTimer = 0; 

        const player = {
            width: 110, 
            height: 30,
            currentTrack: 1, 
            x: 80,
            y: 0
        };

        // Ultra high-fidelity granular pixel matrix system (1000x micro scale translation)
        function drawPixelTrain(x, y, w, h, trainConfig) {
            // Highly micro-fractional matrix unit based on rendering plane boundaries
            let p = h / 240; 
            
            // 1. Sleek upper aerodynamic nose profile chassis structure
            ctx.fillStyle = trainConfig.primaryColor;
            ctx.fillRect(x, y + (30 * p), w - (100 * p), 90 * p);
            ctx.fillRect(x + w - (100 * p), y + (40 * p), 30 * p, 80 * p);
            ctx.fillRect(x + w - (70 * p), y + (55 * p), 25 * p, 65 * p);
            ctx.fillRect(x + w - (45 * p), y + (70 * p), 20 * p, 50 * p);
            ctx.fillRect(x + w - (25 * p), y + (85 * p), 15 * p, 35 * p);
            ctx.fillRect(x + w - (10 * p), y + (100 * p), 10 * p, 20 * p);
            
            // 2. Micro-thin Shinkansen accent stripe line running across length
            ctx.fillStyle = trainConfig.stripeColor;
            ctx.fillRect(x, y + (120 * p), w, 12 * p);

            // 3. Lower bottom silver hull underbelly shroud
            ctx.fillStyle = trainConfig.baseColor;
            ctx.fillRect(x, y + (132 * p), w - (15 * p), 88 * p);
            
            // 4. Ultra-fine micro black rolling wheel-truck configurations
            ctx.fillStyle = "#111";
            ctx.fillRect(x + (40 * p), y + (220 * p), 55 * p, 15 * p);
            ctx.fillRect(x + (150 * p), y + (220 * p), 55 * p, 15 * p);
            ctx.fillRect(x + w - (140 * p), y + (220 * p), 55 * p, 15 * p);

            // 5. Sleek curved aerodynamic cockpit windshield module
            ctx.fillStyle = "#1a252f";
            ctx.fillRect(x + w - (130 * p), y + (50 * p), 35 * p, 18 * p);
            ctx.fillRect(x + w - (95 * p), y + (62 * p), 15 * p, 10 * p);

            // 6. Clean high-resolution aligned square passenger windows grid
            ctx.fillStyle = "#2c3e50";
            let winW = 30 * p;
            let winH = 30 * p;
            let gap = 20 * p;
            for(let sx = x + (30 * p); sx < x + w - (190 * p); sx += (winW + gap)) {
                ctx.fillRect(sx, y + (50 * p), winW, winH);
            }
        }

        // 3x Size Floating Pixelated "X" Crossbuck (Enlarged for toddlers)
        function drawPixelCrossbuck(x, y, size) {
            let p = size / 40; 
            
            ctx.save();
            ctx.translate(x + size/2, y + size/2);
            
            // High-resolution extra-wide yellow structural backing
            ctx.fillStyle = "#f1c40f";
            for (let i = -16; i <= 16; i++) {
                ctx.fillRect((i * p) - (2 * p), (i * p) - (2 * p), 5 * p, 5 * p);
                ctx.fillRect((i * p) - (2 * p), (-i * p) - (2 * p), 5 * p, 5 * p);
            }

            // High-resolution distinct black warning centers
            ctx.fillStyle = "#111111";
            for (let i = -16; i <= 16; i++) {
                ctx.fillRect((i * p) - p, (i * p) - p, 3 * p, 3 * p);
                ctx.fillRect((i * p) - p, (-i * p) - p, 3 * p, 3 * p);
            }
            
            ctx.restore();
        }

        btnUp.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!gameActive) return;
            if (player.currentTrack > 0) {
                player.currentTrack--;
                player.y = trackPositions[player.currentTrack] - (player.height / 2);
            }
        }, { passive: false });

        btnDown.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!gameActive) return;
            if (player.currentTrack < 3) {
                player.currentTrack++;
                player.y = trackPositions[player.currentTrack] - (player.height / 2);
            }
        }, { passive: false });

        btnStart.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startScreen.classList.add('hidden');
            resetGame();
        }, { passive: false });

        btnRestart.addEventListener('touchstart', (e) => {
            e.preventDefault();
            gameOverScreen.classList.add('hidden');
            resetGame();
        }, { passive: false });

        function resetGame() {
            score = 0;
            currentLevel = 1;
            obstacles = [];
            bushes = [];
            gameSpeed = baseSpeed;
            spawnTimer = 0;
            levelUpFlashTimer = 0;
            player.currentTrack = 1;
            scoreVal.textContent = score;
            levelVal.textContent = currentLevel;
            calculateLayout();
            gameActive = true;
            animate();
        }

        function animate() {
            if (!gameActive) return;

            // Environmental maps frame clears
            ctx.fillStyle = "#2ecc71"; 
            ctx.fillRect(0, 0, canvas.width, grassTopHeight);
            ctx.fillRect(0, canvas.height - grassBottomHeight, canvas.width, grassBottomHeight);
            
            ctx.fillStyle = "#bdc3c7"; 
            ctx.fillRect(0, grassTopHeight, canvas.width, trackZoneHeight);

            ctx.fillStyle = "#7f8c8d";
            for(let i = 0; i < 4; i++) {
                ctx.fillRect(0, trackPositions[i] - 2, canvas.width, 4);
            }

            // Scroll bushes background decoration
            if (Math.random() < 0.02) {
                let isTop = Math.random() > 0.5;
                bushes.push({
                    x: canvas.width,
                    y: isTop ? Math.random() * (grassTopHeight - 30) : canvas.height - grassBottomHeight + 10 + Math.random() * (grassBottomHeight - 40),
                    size: Math.random() * (35 - 20) + 20
                });
            }
            
            ctx.fillStyle = "#27ae60"; 
            for(let b = bushes.length - 1; b >= 0; b--) {
                bushes[b].x -= gameSpeed;
                ctx.fillRect(bushes[b].x, bushes[b].y, bushes[b].size, bushes[b].size * 0.8);
                if (bushes[b].x + bushes[b].size < 0) bushes.splice(b, 1);
            }

            // Draw micro high-res train
            drawPixelTrain(player.x, player.y, player.width, player.height, TRAIN_DATABASE[selectedTrainIndex]);

            // Obstacle processing loops
            spawnTimer++;
            if (spawnTimer >= spawnInterval) {
                let randomTrack = Math.floor(Math.random() * 4);
                // 3x Larger Dimensions applied here explicitly to size bounds configuration
                let size = Math.floor(trackSpacing * 1.15); 
                obstacles.push({
                    x: canvas.width,
                    y: trackPositions[randomTrack] - (size / 2),
                    size: size,
                    track: randomTrack
                });
                spawnTimer = 0;
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.x -= gameSpeed;

                // Draw 3x upscaled crossing marker
                drawPixelCrossbuck(obs.x, obs.y, obs.size);

                // Tight hitbox boundaries mapping
                let edgePadding = obs.size * 0.15;
                if (
                    player.currentTrack === obs.track &&
                    player.x + player.width > obs.x + edgePadding &&
                    player.x < obs.x + obs.size - edgePadding
                ) {
                    gameActive = false;
                    finalScore.textContent = score;
                    finalLevel.textContent = currentLevel;
                    gameOverScreen.classList.remove('hidden');
                    return;
                }

                if (obs.x + obs.size < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreVal.textContent = score;

                    if (score > 0 && score % 20 === 0) {
                        currentLevel++;
                        levelVal.textContent = currentLevel;
                        gameSpeed = gameSpeed * 1.07; 
                        levelUpFlashTimer = 90; 
                    }
                }
            }

            if (levelUpFlashTimer > 0) {
                levelUpFlashTimer--;
                ctx.fillStyle = "#f1c40f";
                ctx.font = "bold 40px sans-serif";
                ctx.textAlign = "center";
                ctx.shadowColor = "#000";
                ctx.shadowBlur = 4;
                ctx.fillText("LEVEL UP! SPEED +7%", canvas.width / 2, canvas.height / 2);
                ctx.shadowBlur = 0; 
                ctx.textAlign = "left";
            }

            requestAnimationFrame(animate);
        }

        window.addEventListener('load', () => {
            resizeCanvas();
        });
    </script>
</body>
</html>
